name: Deploy ZRead Wiki To GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".zread/wiki/**"
      - ".github/workflows/deploy-zread-wiki-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Debug wiki files
        run: |
          echo "workspace: $(pwd)"
          ls -la
          ls -la .zread || true
          ls -la .zread/wiki || true

      - name: Ensure no Jekyll processing
        run: touch .zread/wiki/.nojekyll

      - name: Validate wiki entry files
        run: |
          test -f .zread/wiki/current
          test -f .zread/wiki/index.html
          cat .zread/wiki/current

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .zread/wiki

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
