name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'CLI release tag (cli-vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    defaults:
      run:
        working-directory: modelcraft-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: modelcraft-cli/go.mod

      - name: Set build metadata
        id: meta
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^cli-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "version=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build macOS arm64 binary
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.meta.outputs.version }} -X main.commit=${{ steps.meta.outputs.commit }} -X main.buildTime=${{ steps.meta.outputs.build_time }}" \
            -o mc-darwin-arm64 .

      - name: Generate checksum
        run: sha256sum mc-darwin-arm64 > mc-darwin-arm64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CLI ${{ steps.meta.outputs.version }}
          tag_name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            modelcraft-cli/mc-darwin-arm64
            modelcraft-cli/mc-darwin-arm64.sha256
