<!--
  =====================================================
  Sidebar Component - Workspace Mode (Updated)
  =====================================================
  用于组织级别的页面：workspace, team, settings

  设计规范：
  - 选中背景：#dadee5 (不使用 #dbeafe)
  - Logo 背景：#2563eb 纯色（无渐变）
  - 图标 stroke-width: 1.5
  - 折叠宽度：64px，展开宽度：264px
  - 组织选择器移至 TopBar，Sidebar 只显示 Logo

  当前状态：
  - 项目（选中）
  - 团队
  - 组织设置
  =====================================================
-->
<style>
  :root {
    --sidebar-width: 264px;
    --sidebar-collapsed-width: 64px;
  }

  .sidebar {
    width: var(--sidebar-width);
    height: 100vh;
    background: white;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .sidebar.collapsed {
    width: var(--sidebar-collapsed-width);
  }

  /* Sidebar Header - Logo Only (Org selector moved to TopBar) */
  .sidebar-header {
    height: 56px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
  }

  .sidebar-logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-logo svg {
    width: 16px;
    height: 16px;
    color: white;
    stroke-width: 1.5;
  }

  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px;
  }

  .sidebar-section-label {
    padding: 8px 12px 4px;
    font-size: 10px;
    font-family: var(--font-fira-code), ui-monospace, monospace;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    white-space: nowrap;
  }

  .sidebar.collapsed .sidebar-section-label {
    display: none;
  }

  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .sidebar.collapsed .sidebar-nav-item {
    justify-content: center;
    padding: 8px;
  }

  .sidebar-nav-item:hover {
    background-color: #fafafa;
    color: #111827;
  }

  .sidebar-nav-item.active {
    background-color: #dadee5; /* Selected state */
    color: #111827;
    font-weight: 600;
  }

  .sidebar-nav-item svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    stroke-width: 1.5;
  }

  .sidebar-nav-item span {
    opacity: 1;
    transition: opacity 0.2s;
  }

  .sidebar.collapsed .sidebar-nav-item span {
    display: none;
  }

  .sidebar-footer {
    height: 48px;
    padding: 0 8px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-toggle {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.15s;
    color: #6b7280;
    background: none;
    border: none;
  }

  .sidebar-toggle:hover {
    background-color: #fafafa;
    color: #111827;
  }

  .sidebar-toggle svg {
    width: 16px;
    height: 16px;
    stroke-width: 1.5;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sidebar.collapsed .sidebar-toggle svg {
    transform: rotate(180deg);
  }
</style>

<!-- Sidebar - Workspace Mode -->
<aside class="sidebar" id="sidebar-workspace-component">
  <!-- Header: Logo Only (Org selector moved to TopBar) -->
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <i data-lucide="sparkles"></i>
    </div>
  </div>

  <!-- Navigation Content -->
  <div class="sidebar-content">
    <!-- Workspace Navigation -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">WORKSPACE</div>
      <nav>
        <a href="#" class="sidebar-nav-item active">
          <i data-lucide="folder-open"></i>
          <span>项目</span>
        </a>
        <a href="#" class="sidebar-nav-item">
          <i data-lucide="users"></i>
          <span>团队</span>
        </a>
        <a href="#" class="sidebar-nav-item">
          <i data-lucide="settings"></i>
          <span>组织设置</span>
        </a>
      </nav>
    </div>
  </div>

  <!-- Footer: Toggle Button -->
  <div class="sidebar-footer">
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar-workspace-component').classList.toggle('collapsed')">
      <i data-lucide="panel-left-close"></i>
    </button>
  </div>
</aside>
