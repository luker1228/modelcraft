<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目设置 V2 - ModelCraft 原型</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind.config.js"></script>
  <link href="../shared/tailwind-base.css" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --sidebar-width: 200px;
      --topbar-height: 56px;
      --settings-sidebar-width: 220px;
    }

    body {
      font-family: var(--font-inter), system-ui, sans-serif;
      margin: 0;
    }

    h1, h2, h3 {
      font-family: var(--font-space-grotesk), system-ui, sans-serif;
      letter-spacing: -0.025em;
    }

    /* ===== Main Layout ===== */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Topbar ===== */
    .topbar {
      height: var(--topbar-height);
      background: white;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .topbar-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo svg {
      width: 16px;
      height: 16px;
      color: white;
      stroke-width: 1.5;
    }

    .topbar-center {
      flex: 1;
      display: flex;
      align-items: center;
      padding-left: 16px;
    }

    .topbar-breadcrumb {
      display: flex;
      align-items: center;
      font-size: 14px;
      gap: 0;
    }

    .breadcrumb-sep {
      margin: 0 8px;
      color: #d1d5db;
    }

    .breadcrumb-link {
      color: #6b7280;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .breadcrumb-link:hover {
      color: #111827;
    }

    .breadcrumb-current {
      color: #111827;
      font-weight: 500;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .topbar-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .topbar-btn:hover {
      background: #f3f4f6;
      color: #111827;
    }

    .topbar-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 1.5;
    }

    .topbar-divider {
      width: 1px;
      height: 20px;
      background: #e5e7eb;
      margin: 0 8px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      border: none;
      transition: background 0.15s;
    }

    .topbar-user:hover { background: #f3f4f6; }

    .topbar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    /* ===== Main Area ===== */
    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== Main Sidebar ===== */
    .sidebar {
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .sidebar-nav-item:hover {
      background: #f3f4f6;
      color: #111827;
    }

    .sidebar-nav-item.active {
      background: #dadee5;
      color: #111827;
      font-weight: 600;
    }

    .sidebar-nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke-width: 1.5;
    }

    .sidebar-footer {
      height: 48px;
      padding: 0 8px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* ===== Page Content ===== */
    .page-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      background: #fafafa;
    }

    /* ===== Settings Sidebar (220px, matches React impl) ===== */
    .settings-sidebar {
      width: var(--settings-sidebar-width);
      background: white;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .settings-sidebar-inner {
      padding: 16px;
    }

    /* Sidebar title: text-sm font-semibold */
    .settings-sidebar-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      padding: 0 8px 12px;
      margin: 0;
    }

    /* Group label: text-[10px] font-mono uppercase tracking-wider text-muted */
    .settings-nav-group-label {
      font-size: 10px;
      font-family: var(--font-fira-code), ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      padding: 0 8px;
      margin-bottom: 4px;
    }

    /* Nav items: rounded-md px-2 py-1.5 text-sm */
    .settings-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .settings-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .settings-nav-item:hover {
      background: #f3f4f6;
      color: #111827;
    }

    /* Active: bg-[#dadee5] font-semibold text-foreground — NO left border */
    .settings-nav-item.active {
      background: #dadee5;
      color: #111827;
      font-weight: 600;
    }

    .settings-nav-item svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      stroke-width: 1.5;
    }

    /* ===== Settings Content ===== */
    .settings-content {
      flex: 1;
      overflow-y: auto;
    }

    .settings-content-inner {
      max-width: 768px;   /* ~max-w-3xl */
      margin: 0 auto;
      padding: 32px 40px;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 4px;
    }

    .page-description {
      font-size: 14px;
      color: #6b7280;
      margin: 0;
    }

    /* ===== Settings Card (matches rounded-lg border bg-white) ===== */
    .settings-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .settings-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .settings-card-header svg {
      width: 15px;
      height: 15px;
      color: #9ca3af;
      flex-shrink: 0;
      stroke-width: 1.5;
    }

    .settings-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin: 0;
      flex: 1;
    }

    .settings-card-body {
      padding: 20px;
    }

    /* ===== Form Fields ===== */
    .form-field {
      margin-bottom: 16px;
    }

    .form-field:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #111827;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      color: #374151;
      background: white;
      font-family: var(--font-inter), system-ui, sans-serif;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .form-control:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .form-hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 8px;
    }

    /* Password field with eye toggle */
    .form-control-wrap {
      position: relative;
    }

    .form-control-wrap .form-control {
      padding-right: 36px;
    }

    .form-control-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      display: flex;
      align-items: center;
      padding: 0;
    }

    .form-control-eye svg {
      width: 14px;
      height: 14px;
      stroke-width: 1.5;
    }

    /* ===== Section Footer (bg-gray-50, border-t) ===== */
    .settings-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .footer-feedback {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      min-height: 20px;
    }

    .footer-feedback svg {
      width: 14px;
      height: 14px;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .footer-feedback.success { color: #059669; }
    .footer-feedback.error   { color: #e11d48; }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-inter), system-ui, sans-serif;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      stroke-width: 1.5;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-outline {
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .btn-outline:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    /* ===== Status Badge ===== */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 400;
      border: 1px solid;
    }

    .status-badge.active {
      background: #ecfdf5;
      color: #059669;
      border-color: #d1fae5;
    }

    .status-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #059669;
      display: inline-block;
    }

    /* ===== Danger Zone ===== */
    .danger-card {
      background: white;
      border: 1px solid #fecaca;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .danger-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #fecaca;
      background: #fef2f2;
    }

    .danger-card-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #dc2626;
      margin: 0 0 2px;
    }

    .danger-card-header p {
      font-size: 12px;
      color: #f87171;
      margin: 0;
    }

    .danger-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }

    .danger-row-text p:first-child {
      font-size: 14px;
      font-weight: 500;
      color: #111827;
      margin: 0 0 2px;
    }

    .danger-row-text p:last-child {
      font-size: 12px;
      color: #9ca3af;
      margin: 0;
    }

    .btn-danger-outline {
      background: white;
      color: #ef4444;
      border: 1px solid #fecaca;
      height: 32px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: not-allowed;
      opacity: 0.7;
      font-family: var(--font-inter), system-ui, sans-serif;
    }

    .btn-danger-outline svg {
      width: 14px;
      height: 14px;
      stroke-width: 1.5;
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- ===== Topbar ===== -->
    <header class="topbar">
      <div class="topbar-left">
        <button style="background:none;border:none;padding:8px;border-radius:8px;cursor:pointer;">
          <div class="topbar-logo">
            <i data-lucide="sparkles"></i>
          </div>
        </button>
      </div>

      <div class="topbar-center">
        <nav class="topbar-breadcrumb">
          <a href="#" class="breadcrumb-link">luke11的工作空间</a>
          <span class="breadcrumb-sep">/</span>
          <a href="#" class="breadcrumb-link">myproject</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">设置</span>
        </nav>
      </div>

      <div class="topbar-right">
        <button class="topbar-btn"><i data-lucide="search"></i></button>
        <button class="topbar-btn"><i data-lucide="bell"></i></button>
        <button class="topbar-btn"><i data-lucide="help-circle"></i></button>
        <div class="topbar-divider"></div>
        <button class="topbar-user">
          <div class="topbar-avatar">张</div>
          <i data-lucide="chevron-down" style="width:14px;height:14px;color:#9ca3af;"></i>
        </button>
      </div>
    </header>

    <!-- ===== Main Area ===== -->
    <div class="main-area">

      <!-- ── Main Sidebar (from AppLayout, 200px) ── -->
      <aside class="sidebar">
        <div class="sidebar-content">
          <nav>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="layout-dashboard"></i>
              <span>概览</span>
            </a>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="table-2"></i>
              <span>模型编辑器</span>
            </a>
            <a href="#" class="sidebar-nav-item active">
              <i data-lucide="settings"></i>
              <span>项目设置</span>
            </a>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="plug"></i>
              <span>API</span>
            </a>
          </nav>
        </div>

        <div class="sidebar-footer">
          <button style="background:none;border:none;cursor:pointer;color:#6b7280;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.15s;">
            <i data-lucide="panel-left-close" style="width:16px;height:16px;stroke-width:1.5;"></i>
          </button>
        </div>
      </aside>

      <!-- ── Page Content (Settings Sidebar + Main Content) ── -->
      <div class="page-content">

        <!-- ── Settings Sidebar (220px) ── -->
        <aside class="settings-sidebar">
          <div class="settings-sidebar-inner">
            <!-- Title -->
            <h2 class="settings-sidebar-title">设置</h2>

            <!-- Nav group: 配置 -->
            <div>
              <p class="settings-nav-group-label">配置</p>
              <nav class="settings-nav">
                <!-- Only one item currently: 集群配置 -->
                <button class="settings-nav-item active">
                  <i data-lucide="database"></i>
                  <span>集群配置</span>
                </button>
              </nav>
            </div>
          </div>
        </aside>

        <!-- ── Main Content ── -->
        <div class="settings-content">
          <div class="settings-content-inner">

            <!-- Page Header -->
            <div class="page-header">
              <h1 class="page-title">项目设置</h1>
              <p class="page-description">管理您的项目配置和数据库连接</p>
            </div>

            <!-- ────────────────────────────────────────── -->
            <!-- Section 1: 基本信息                         -->
            <!-- ────────────────────────────────────────── -->
            <div class="settings-card">
              <div class="settings-card-header">
                <i data-lucide="info"></i>
                <h2 class="settings-card-title">基本信息</h2>
              </div>
              <div class="settings-card-body">

                <!-- 显示名称 -->
                <div class="form-field">
                  <label class="form-label">显示名称</label>
                  <input type="text" class="form-control" value="主数据库集群" />
                </div>

                <!-- 描述 -->
                <div class="form-field">
                  <label class="form-label">描述</label>
                  <input type="text" class="form-control" value="用于处理电商相关的数据和 API" />
                </div>

              </div>

              <!-- Footer: right-aligned cancel + save -->
              <div class="settings-card-footer">
                <div class="footer-feedback"><!-- empty when no feedback --></div>
                <div class="footer-actions">
                  <button class="btn btn-outline">取消</button>
                  <button class="btn btn-primary">保存</button>
                </div>
              </div>
            </div>

            <!-- ────────────────────────────────────────── -->
            <!-- Section 2: 连接配置                         -->
            <!-- ────────────────────────────────────────── -->
            <div class="settings-card">
              <div class="settings-card-header">
                <i data-lucide="database"></i>
                <h2 class="settings-card-title">连接配置</h2>
                <!-- Status badge (right-aligned via flex ml-auto on title) -->
                <span class="status-badge active">
                  <span class="status-badge-dot"></span>
                  已连接
                </span>
              </div>
              <div class="settings-card-body">

                <!-- 主机地址 -->
                <div class="form-field">
                  <label class="form-label">主机地址</label>
                  <div class="form-row">
                    <input type="text" class="form-control" value="prod-db.company.com" placeholder="localhost" />
                    <input type="text" class="form-control" value="5432" placeholder="3306" />
                  </div>
                  <p class="form-hint">主机名和端口号</p>
                </div>

                <!-- 用户名 -->
                <div class="form-field">
                  <label class="form-label">用户名</label>
                  <input type="text" class="form-control" value="db_admin" />
                </div>

                <!-- 密码 -->
                <div class="form-field">
                  <label class="form-label">密码</label>
                  <div class="form-control-wrap">
                    <input type="password" class="form-control" value="password123" />
                    <button class="form-control-eye">
                      <i data-lucide="eye"></i>
                    </button>
                  </div>
                  <p class="form-hint">已设置密码，输入新密码可修改</p>
                </div>

              </div>

              <!-- Footer: left=test result, right=actions -->
              <div class="settings-card-footer">
                <!-- Test result feedback (success state shown) -->
                <div class="footer-feedback success">
                  <i data-lucide="check-circle"></i>
                  <span>连接成功！耗时 12.00ms</span>
                </div>
                <div class="footer-actions">
                  <button class="btn btn-outline">
                    <i data-lucide="wifi"></i>
                    测试连接
                  </button>
                  <button class="btn btn-outline">取消</button>
                  <button class="btn btn-primary">保存</button>
                </div>
              </div>
            </div>

            <!-- ────────────────────────────────────────── -->
            <!-- Section 3: 危险区域                         -->
            <!-- ────────────────────────────────────────── -->
            <div class="danger-card">
              <div class="danger-card-header">
                <h2>危险区域</h2>
                <p>以下操作不可撤销，请谨慎操作</p>
              </div>

              <!-- Only one row: 删除项目 -->
              <div class="danger-row">
                <div class="danger-row-text">
                  <p>删除项目</p>
                  <p>永久删除此项目及所有相关数据，此操作无法撤销</p>
                </div>
                <!-- Disabled button (cursor-not-allowed) -->
                <button class="btn-danger-outline" disabled>
                  <i data-lucide="trash-2"></i>
                  删除项目
                </button>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
