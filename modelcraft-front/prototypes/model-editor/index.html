<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型编辑器 - ModelCraft 原型</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind.config.js"></script>
  <link href="../shared/tailwind-base.css" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: var(--font-inter), system-ui, sans-serif;
      background: #fafafa;
    }

    h1, h2, h3 {
      font-family: var(--font-space-grotesk), system-ui, sans-serif;
      letter-spacing: -0.025em;
    }

    .split-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }

    .db-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #374151;
      transition: all 0.2s;
    }

    .db-selector:hover {
      border-color: #2563eb;
      background: #f0f9ff;
    }

    .sidebar-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-search {
      padding: 12px;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .sidebar-models {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .model-item {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #374151;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
      margin-bottom: 4px;
    }

    .model-item:hover {
      background: #f3f4f6;
    }

    .model-item.active {
      background: #dbeafe;
      color: #2563eb;
      font-weight: 500;
    }

    .model-menu-btn {
      opacity: 0;
      cursor: pointer;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      background: transparent;
      color: #9ca3af;
      transition: all 0.2s;
    }

    .model-item:hover .model-menu-btn {
      opacity: 1;
      color: #6b7280;
    }

    .sidebar-actions {
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .btn-new-model {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-new-model:hover {
      background: #1d4ed8;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: white;
    }

    .table-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .table-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .table-title-copy {
      font-family: var(--font-fira-code), monospace;
      font-size: 12px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 4px 8px;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
    }

    .table-title-copy:hover {
      background: #e5e7eb;
      color: #374151;
    }

    .table-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-action {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #e5e7eb;
      background: white;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #374151;
      transition: all 0.2s;
    }

    .btn-action:hover {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .btn-action.primary {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .btn-action.primary:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }

    .btn-action svg {
      width: 16px;
      height: 16px;
    }

    .table-container {
      flex: 1;
      overflow: auto;
      padding: 16px 24px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead {
      position: sticky;
      top: 0;
      background: white;
      border-bottom: 2px solid #e5e7eb;
      z-index: 10;
    }

    .data-table th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #374151;
      background: white;
      height: 40px;
      border-bottom: 2px solid #e5e7eb;
    }

    .data-table th:first-child {
      padding-left: 8px;
    }

    .data-table td {
      padding: 12px 16px;
      color: #374151;
      border-bottom: 1px solid #e5e7eb;
      height: 40px;
      vertical-align: middle;
    }

    .data-table td:first-child {
      padding-left: 8px;
    }

    .data-table tbody tr {
      transition: all 0.2s;
    }

    .data-table tbody tr:hover {
      background: #f9fafb;
    }

    .data-table tbody tr.selected {
      background: #f0f9ff;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      cursor: pointer;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .checkbox:hover {
      border-color: #2563eb;
      background: #f0f9ff;
    }

    .checkbox.checked {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }

    .cell-text {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell-boolean {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: #ecfdf5;
      color: #059669;
      font-weight: 600;
      font-size: 12px;
    }

    .cell-boolean.false {
      background: #fee2e2;
      color: #ef4444;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
      text-align: center;
    }

    .empty-state-icon {
      width: 48px;
      height: 48px;
      color: #d1d5db;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .pagination {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .pagination-info {
      font-size: 12px;
      color: #6b7280;
    }

    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pagination-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #e5e7eb;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      transition: all 0.2s;
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="split-container">
    <!-- 左侧侧边栏 -->
    <div class="sidebar">
      <!-- 侧边栏头部 -->
      <div class="sidebar-header">
        <div class="sidebar-title">模型编辑器</div>
        <div class="db-selector">
          <i data-lucide="database" style="width: 16px; height: 16px;"></i>
          <span>电商DB</span>
          <i data-lucide="chevron-down" style="width: 16px; height: 16px; margin-left: auto;"></i>
        </div>
      </div>

      <!-- 搜索和模型列表 -->
      <div class="sidebar-content">
        <div class="sidebar-search">
          <input type="text" class="search-input" placeholder="搜索模型...">
        </div>

        <div class="sidebar-models">
          <button class="model-item active">
            <span>用户 (User)</span>
            <button class="model-menu-btn">
              <i data-lucide="more-vertical" style="width: 16px; height: 16px;"></i>
            </button>
          </button>
          <button class="model-item">
            <span>商品 (Product)</span>
            <button class="model-menu-btn">
              <i data-lucide="more-vertical" style="width: 16px; height: 16px;"></i>
            </button>
          </button>
          <button class="model-item">
            <span>订单 (Order)</span>
            <button class="model-menu-btn">
              <i data-lucide="more-vertical" style="width: 16px; height: 16px;"></i>
            </button>
          </button>
          <button class="model-item">
            <span>分类 (Category)</span>
            <button class="model-menu-btn">
              <i data-lucide="more-vertical" style="width: 16px; height: 16px;"></i>
            </button>
          </button>
          <button class="model-item">
            <span>评论 (Review)</span>
            <button class="model-menu-btn">
              <i data-lucide="more-vertical" style="width: 16px; height: 16px;"></i>
            </button>
          </button>
        </div>
      </div>

      <!-- 新建按钮 -->
      <div class="sidebar-actions">
        <button class="btn-new-model">
          <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
          新建模型
        </button>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="main-content">
      <!-- 表格头部 -->
      <div class="table-header">
        <div class="table-title">
          <span>用户 (User)</span>
          <div class="table-title-copy" title="点击复制">users</div>
        </div>
        <div class="table-actions">
          <button class="btn-action">
            <i data-lucide="filter" style="width: 14px; height: 14px;"></i>
            筛选
          </button>
          <button class="btn-action">
            <i data-lucide="arrow-up-down" style="width: 14px; height: 14px;"></i>
            排序
          </button>
          <button class="btn-action">
            <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
            插入行
          </button>
          <button class="btn-action">
            <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
            新增字段
          </button>
          <button class="btn-action">
            <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i>
          </button>
        </div>
      </div>

      <!-- 数据表格 -->
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 40px;">
                <div class="checkbox checked">
                  <i data-lucide="check" style="width: 12px; height: 12px;"></i>
                </div>
              </th>
              <th>ID</th>
              <th>用户名 (username)</th>
              <th>邮箱 (email)</th>
              <th>年龄 (age)</th>
              <th>激活 (active)</th>
              <th style="width: 40px;"></th>
            </tr>
          </thead>
          <tbody>
            <tr class="selected">
              <td><div class="checkbox checked"><i data-lucide="check" style="width: 12px; height: 12px;"></i></div></td>
              <td>1</td>
              <td><div class="cell-text">john_doe</div></td>
              <td><div class="cell-text">john@example.com</div></td>
              <td>28</td>
              <td><div class="cell-boolean">✓</div></td>
              <td>
                <button class="model-menu-btn">
                  <i data-lucide="more-vertical" style="width: 14px; height: 14px;"></i>
                </button>
              </td>
            </tr>
            <tr>
              <td><div class="checkbox"></div></td>
              <td>2</td>
              <td><div class="cell-text">jane_smith</div></td>
              <td><div class="cell-text">jane@example.com</div></td>
              <td>32</td>
              <td><div class="cell-boolean">✓</div></td>
              <td>
                <button class="model-menu-btn">
                  <i data-lucide="more-vertical" style="width: 14px; height: 14px;"></i>
                </button>
              </td>
            </tr>
            <tr>
              <td><div class="checkbox"></div></td>
              <td>3</td>
              <td><div class="cell-text">bob_wilson</div></td>
              <td><div class="cell-text">bob@example.com</div></td>
              <td>25</td>
              <td><div class="cell-boolean false">✕</div></td>
              <td>
                <button class="model-menu-btn">
                  <i data-lucide="more-vertical" style="width: 14px; height: 14px;"></i>
                </button>
              </td>
            </tr>
            <tr>
              <td><div class="checkbox"></div></td>
              <td>4</td>
              <td><div class="cell-text">alice_johnson</div></td>
              <td><div class="cell-text">alice@example.com</div></td>
              <td>29</td>
              <td><div class="cell-boolean">✓</div></td>
              <td>
                <button class="model-menu-btn">
                  <i data-lucide="more-vertical" style="width: 14px; height: 14px;"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div class="pagination">
        <div class="pagination-info">
          已选择 1 行 / 共 42 行
        </div>
        <div class="pagination-controls">
          <button class="pagination-btn">
            <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i>
          </button>
          <span style="font-size: 12px; color: #6b7280; min-width: 40px; text-align: center;">第 1 页</span>
          <button class="pagination-btn">
            <i data-lucide="chevron-right" style="width: 16px; height: 16px;"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
