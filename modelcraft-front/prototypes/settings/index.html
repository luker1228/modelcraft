<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目设置 - ModelCraft 原型</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../shared/tailwind.config.js"></script>
  <link href="../shared/tailwind-base.css" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --sidebar-width: 200px;
      --topbar-height: 56px;
    }

    body {
      font-family: var(--font-inter), system-ui, sans-serif;
      margin: 0;
    }

    h1, h2, h3 {
      font-family: var(--font-space-grotesk), system-ui, sans-serif;
      letter-spacing: -0.025em;
    }

    /* ===== Layout ===== */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Topbar ===== */
    .topbar {
      height: var(--topbar-height);
      background: white;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .topbar-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-logo svg {
      width: 16px;
      height: 16px;
      color: white;
      stroke-width: 1.5;
    }

    .topbar-center {
      flex: 1;
      display: flex;
      align-items: center;
      padding-left: 16px;
    }

    .topbar-breadcrumb {
      display: flex;
      align-items: center;
      font-size: 14px;
      gap: 0;
    }

    .breadcrumb-sep {
      margin: 0 8px;
      color: #d1d5db;
    }

    .breadcrumb-link {
      color: #6b7280;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .breadcrumb-link:hover {
      color: #111827;
    }

    .breadcrumb-current {
      color: #111827;
      font-weight: 500;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .topbar-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .topbar-btn:hover {
      background: #f3f4f6;
      color: #111827;
    }

    .topbar-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 1.5;
    }

    .topbar-divider {
      width: 1px;
      height: 20px;
      background: #e5e7eb;
      margin: 0 8px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      border: none;
      transition: background 0.15s;
    }

    .topbar-user:hover { background: #f3f4f6; }

    .topbar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: white;
    }

    .topbar-user svg {
      width: 16px;
      height: 16px;
      color: #9ca3af;
      stroke-width: 1.5;
    }

    /* ===== Main Area ===== */
    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .sidebar-section-label {
      padding: 8px 12px 4px;
      font-size: 10px;
      font-family: var(--font-fira-code), ui-monospace, monospace;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .sidebar-nav-item:hover {
      background: #f3f4f6;
      color: #111827;
    }

    .sidebar-nav-item.active {
      background: #dadee5;
      color: #111827;
      font-weight: 600;
    }

    .sidebar-nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke-width: 1.5;
    }

    .sidebar-footer {
      height: 48px;
      padding: 0 8px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .sidebar-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      color: #6b7280;
      background: none;
      border: none;
      transition: all 0.15s;
    }

    .sidebar-toggle:hover { background: #f3f4f6; color: #111827; }
    .sidebar-toggle svg { width: 16px; height: 16px; stroke-width: 1.5; }

    /* ===== Page Content ===== */
    .page-content {
      flex: 1;
      background: #fafafa;
      overflow-y: auto;
    }

    .page-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ===== Page Header ===== */
    .page-header {
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 4px;
    }

    /* ===== Single-column stack ===== */
    .two-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ===== Card / Section ===== */
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }

    .card-header svg {
      width: 15px;
      height: 15px;
      color: #6b7280;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .card-body {
      padding: 20px;
    }

    /* ===== Form ===== */
    .form-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .form-row:first-child { padding-top: 0; }
    .form-row:last-child { border-bottom: none; padding-bottom: 0; }

    .form-label-group {
      flex: 0 0 auto;
      width: 38%;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .form-label .req {
      color: #ef4444;
      font-size: 11px;
    }

    .form-hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
      line-height: 1.4;
    }

    .form-control {
      flex: 1;
    }

    .form-input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      color: #374151;
      background: white;
      box-sizing: border-box;
      transition: all 0.2s;
      font-family: var(--font-inter), system-ui, sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .form-input::placeholder { color: #9ca3af; }

    .form-input.mono {
      font-family: var(--font-fira-code), ui-monospace, monospace;
      font-size: 12px;
    }

    .host-port-row {
      display: grid;
      grid-template-columns: 1fr 80px;
      gap: 8px;
    }

    /* ===== Status badge ===== */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.active {
      background: #ecfdf5;
      color: #059669;
      border: 1px solid #d1fae5;
    }

    .status-badge.active .pulse-dot {
      width: 6px;
      height: 6px;
      background: #059669;
      border-radius: 50%;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== Card footer / action bar ===== */
    .card-footer {
      padding: 12px 20px;
      border-top: 1px solid #e5e7eb;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .card-footer.with-result {
      justify-content: space-between;
    }

    .test-result {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .test-result.success { color: #059669; }
    .test-result.error   { color: #ef4444; }

    .test-result svg { width: 14px; height: 14px; stroke-width: 2; }

    /* ===== Buttons ===== */
    .btn {
      height: 32px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: var(--font-inter), system-ui, sans-serif;
    }

    .btn svg { width: 14px; height: 14px; stroke-width: 1.5; }

    .btn-outline {
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .btn-outline:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      border: 1px solid transparent;
    }

    .btn-primary:hover { background: #1d4ed8; }

    .btn-primary:disabled {
      background: #bfdbfe;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- ===== Topbar ===== -->
    <header class="topbar">
      <div class="topbar-left">
        <button style="background:none;border:none;padding:8px;border-radius:8px;cursor:pointer;">
          <div class="topbar-logo">
            <i data-lucide="sparkles"></i>
          </div>
        </button>
      </div>

      <div class="topbar-center">
        <nav class="topbar-breadcrumb">
          <a href="#" class="breadcrumb-link">luke11的工作空间</a>
          <span class="breadcrumb-sep">/</span>
          <a href="#" class="breadcrumb-link">myproject</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">设置</span>
        </nav>
      </div>

      <div class="topbar-right">
        <button class="topbar-btn"><i data-lucide="search"></i></button>
        <button class="topbar-btn"><i data-lucide="bell"></i></button>
        <button class="topbar-btn"><i data-lucide="help-circle"></i></button>
        <div class="topbar-divider"></div>
        <button class="topbar-user">
          <div class="topbar-avatar">张</div>
          <i data-lucide="chevron-down" style="width:14px;height:14px;color:#9ca3af;"></i>
        </button>
      </div>
    </header>

    <!-- ===== Main Area ===== -->
    <div class="main-area">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-content">
          <div class="sidebar-section-label">PROJECT</div>
          <nav>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="layout-dashboard"></i>
              <span>概览</span>
            </a>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="table-2"></i>
              <span>模型编辑器</span>
            </a>
            <a href="#" class="sidebar-nav-item active">
              <i data-lucide="settings"></i>
              <span>设置</span>
            </a>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="plug"></i>
              <span>API</span>
            </a>
            <a href="#" class="sidebar-nav-item">
              <i data-lucide="settings"></i>
              <span>项目设置</span>
            </a>
          </nav>
        </div>

        <div class="sidebar-footer">
          <button class="sidebar-toggle">
            <i data-lucide="panel-left-close"></i>
          </button>
        </div>
      </aside>

      <!-- Page Content -->
      <main class="page-content">
        <div class="page-inner">

          <!-- Page Header -->
          <div class="page-header">
            <h1 class="page-title">项目设置</h1>
          </div>

          <!-- Two-column layout -->
          <div class="two-col">

            <!-- Left: 基本信息 -->
            <div class="card">
              <div class="card-header">
                <i data-lucide="info"></i>
                <span class="card-header-title">基本信息</span>
              </div>

              <div class="card-body">
                <!-- 显示名称 -->
                <div class="form-row">
                  <div class="form-label-group">
                    <div class="form-label">
                      显示名称<span class="req">*</span>
                    </div>
                  </div>
                  <div class="form-control">
                    <input type="text" class="form-input" value="电商数据库">
                  </div>
                </div>

                <!-- 描述 -->
                <div class="form-row">
                  <div class="form-label-group">
                    <div class="form-label">描述</div>
                  </div>
                  <div class="form-control">
                    <input type="text" class="form-input" placeholder="输入描述..." value="生产环境电商数据库">
                  </div>
                </div>

                <!-- 状态 -->
                <div class="form-row">
                  <div class="form-label-group">
                    <div class="form-label">状态</div>
                    <div class="form-hint">当前连接状态</div>
                  </div>
                  <div class="form-control" style="display:flex;align-items:center;height:34px;">
                    <span class="status-badge active">
                      <span class="pulse-dot"></span>
                      已连接
                    </span>
                  </div>
                </div>
              </div>

              <div class="card-footer">
                <button class="btn btn-outline">取消</button>
                <button class="btn btn-primary">
                  <i data-lucide="save"></i>
                  保存
                </button>
              </div>
            </div>

            <!-- Right: 连接配置 -->
            <div class="card">
              <div class="card-header">
                <i data-lucide="database"></i>
                <span class="card-header-title">连接配置</span>
              </div>

              <div class="card-body">
                <!-- 主机 + 端口 -->
                <div class="form-row">
                  <div class="form-label-group">
                    <div class="form-label">
                      主机地址<span class="req">*</span>
                    </div>
                    <div class="form-hint">服务器地址与端口</div>
                  </div>
                  <div class="form-control">
                    <div class="host-port-row">
                      <input type="text" class="form-input mono" placeholder="localhost" value="prod-db.company.com">
                      <input type="text" class="form-input mono" placeholder="3306" value="5432">
                    </div>
                  </div>
                </div>

                <!-- 用户名 -->
                <div class="form-row">
                  <div class="form-label-group">
                    <div class="form-label">
                      用户名<span class="req">*</span>
                    </div>
                  </div>
                  <div class="form-control">
                    <input type="text" class="form-input mono" placeholder="root" value="db_admin">
                  </div>
                </div>

                <!-- 密码 -->
                <div class="form-row">
                  <div class="form-label-group">
                    <div class="form-label">
                      密码<span class="req">*</span>
                    </div>
                  </div>
                  <div class="form-control" style="position:relative;">
                    <input type="password" class="form-input mono" placeholder="已设置密码，输入新密码可修改" style="padding-right:36px;">
                    <button style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;display:flex;align-items:center;">
                      <i data-lucide="eye" style="width:14px;height:14px;stroke-width:1.5;"></i>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Footer with test result + actions -->
              <div class="card-footer with-result">
                <div class="test-result success" id="testResult">
                  <i data-lucide="check-circle"></i>
                  <span>连接成功，耗时 12ms</span>
                </div>
                <div style="display:flex;gap:8px;">
                  <button class="btn btn-outline" id="testBtn">
                    <i data-lucide="wifi"></i>
                    测试连接
                  </button>
                  <button class="btn btn-outline">取消</button>
                  <button class="btn btn-primary">
                    <i data-lucide="save"></i>
                    保存
                  </button>
                </div>
              </div>
            </div>

          </div><!-- /two-col -->
        </div><!-- /page-inner -->
      </main>
    </div><!-- /main-area -->
  </div><!-- /layout -->

  <script>
    lucide.createIcons();

    // 模拟测试连接
    document.getElementById('testBtn').addEventListener('click', function() {
      const result = document.getElementById('testResult');
      result.className = 'test-result';
      result.style.color = '#2563eb';
      result.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.6s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span>正在测试...</span>';

      setTimeout(() => {
        result.className = 'test-result success';
        result.innerHTML = '';
        lucide.createIcons({ icons: { 'check-circle': true } });
        result.innerHTML = '<i data-lucide="check-circle"></i><span>连接成功，耗时 12ms</span>';
        lucide.createIcons();
      }, 1200);
    });
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
