# ============================================
# RLS Expression Validation Schema
# Only validateRLSExpr remains — V1 five-piece-set
# (setModelRLSPolicy / modelRLSPolicy) has been removed.
# Multi-policy CRUD lives in rls_policy_v2.graphql.
# ============================================

# ----------------------------------------
# Enums
# ----------------------------------------

enum RLSExprType {
  SELECT_PREDICATE
  INSERT_CHECK
  UPDATE_PREDICATE
  UPDATE_CHECK
  DELETE_PREDICATE
}

# ----------------------------------------
# Types
# ----------------------------------------

type ValidationResult {
  """
  是否校验通过
  """
  valid: Boolean!

  """
  校验错误信息列表（valid=false 时返回）
  """
  errors: [ValidationError!]
}

type ValidationError {
  """
  错误位置（如 "selectPredicate._and[0].owner"）
  """
  path: String!

  """
  错误描述
  """
  message: String!

  """
  错误码
  """
  code: String!
}

# ----------------------------------------
# Error Types
# ----------------------------------------

type InvalidRLSExpression implements Error {
  message: String!
  suggestion: String
  path: String
}

type InvalidAuthVariable implements Error {
  message: String!
  suggestion: String
  variable: String
}

union ValidateRLSExprError = ResourceNotFound | InvalidRLSExpression | InvalidAuthVariable

# ----------------------------------------
# Payload Types
# ----------------------------------------

type ValidateRLSExprPayload {
  result: ValidationResult!
  error: ValidateRLSExprError
  dryRun: RLSExprDryRun
}

type RLSExprDryRun {
  sql: String
  params: [String!]
  result: Boolean
}

# ----------------------------------------
# Input Types
# ----------------------------------------

input ValidateRLSExprInput {
  """
  所属模型 ID（用于字段名白名单校验）
  """
  modelId: ID!

  """
  要校验的谓词类型
  """
  exprType: RLSExprType!

  """
  表达式 CEL 字符串
  """
  expression: String!

  """
  check 表达式 dry run 时使用的示例输入 JSON
  """
  sampleInput: String
}

# ----------------------------------------
# Mutations
# ----------------------------------------

extend type Mutation {
  """
  校验 RLS 表达式合法性 + dry-run
  用于 Policy 配置页面的实时校验
  """
  validateRLSExpr(input: ValidateRLSExprInput!): ValidateRLSExprPayload! @hasPermission(action: "model:read")
}
