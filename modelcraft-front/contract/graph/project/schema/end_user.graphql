# End-User related types, inputs and mutations
#
# Dependencies (defined in other files, referenced here):
#   - interface Error           → cluster.graphql
#   - type InvalidInput         → field.graphql
#   - type ResourceNotFound     → base.graphql
#   - scalar Time               → base.graphql
#   - interface Node            → base.graphql
#   - type PageInfo             → base.graphql

# ============================================
# End User Error Types (new types only)
# ============================================

type EndUserAlreadyExists implements Error {
  message: String!
}

type EndUserPasswordTooWeak implements Error {
  message: String!
  suggestion: String
}

# ClusterNotFound is now ResourceNotFound with resourceType=CLUSTER
union CreateEndUserError = EndUserAlreadyExists | EndUserPasswordTooWeak | ResourceNotFound | InvalidInput
union UpdateEndUserError = ResourceNotFound | InvalidInput
union DeleteEndUserError = ResourceNotFound
union ListProjectEndUsersError = ResourceNotFound

# InitPrivateDBError indicates private DB initialization failures.
type InitPrivateDBError implements Error {
  message: String!
}

union InitPrivateDBPayloadError = InitPrivateDBError | ResourceNotFound

# ============================================
# End User Types
# ============================================

type EndUser implements Node {
  id: ID!
  username: String!
  isForbidden: Boolean!
  createdBy: String!
  createdAt: Time!
  updatedAt: Time!
}

type EndUserConnection {
  nodes: [EndUser!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# ============================================
# Payload Types
# ============================================

type CreateEndUserPayload {
  endUser: EndUser
  error: CreateEndUserError
}

type UpdateEndUserStatusPayload {
  endUser: EndUser
  error: UpdateEndUserError
}

type DeleteEndUserPayload {
  success: Boolean!
  error: DeleteEndUserError
}

type ListProjectEndUsersPayload {
  connection: EndUserConnection   # nullable: null when error exists
  error: ListProjectEndUsersError
}

type InitPrivateDBPayload {
  success: Boolean!
  error: InitPrivateDBPayloadError
}

# ============================================
# Input Types
# ============================================

input CreateEndUserInput {
  username: String!   # 3–64 chars, ^[a-zA-Z0-9_-]+$
  password: String!   # at least 8 chars, must contain letter + digit
}

input UpdateEndUserStatusInput {
  userId: ID!
  isForbidden: Boolean!
}

input DeleteEndUserInput {
  userId: ID!
}

input ListProjectEndUsersInput {
  search: String     # username fuzzy search
  first: Int         # page size, default 20
  after: String      # cursor
}

# ============================================
# Query & Mutation
# ============================================

extend type Query {
  listProjectEndUsers(input: ListProjectEndUsersInput): ListProjectEndUsersPayload! @hasPermission(action: "end-user:read")
}

# ============================================
# System User Query Types (findUsers / me)
# Used by EndUserRef field selectors and tenant management.
# Tenant callers: developer JWT via /graphql/org/{orgName}/project/{projectSlug}/
# End-user callers: end-user JWT via /graphql/end-user/org/{orgName}/project/{projectSlug}/
#
# Note: "User" (not "Tuser") is used here because this is a fixed system model name.
# The Tuser prefix exists only for custom models whose names may start with a digit,
# making them invalid as GraphQL type names. "user" is always a valid identifier.
# ============================================

# User is the public projection of an end-user (no tenant fields).
type User {
  id: ID!
  username: String!
  createdAt: Time!
}

# ---- Filter inputs ----

input StringFilter {
  eq: String
  contains: String
  startsWith: String
  in: [String!]
}

input IDFilter {
  eq: ID
  in: [ID!]
}

input DateTimeFilter {
  eq: String
  gte: String
  lte: String
}

input UserWhereInput {
  id: IDFilter
  username: StringFilter
  createdAt: DateTimeFilter
}

# ---- Result types ----

type UserFindManyResult {
  items: [User!]!
  totalCount: Int
  reqId: String!
}

type UserFindOneResult {
  item: User
  reqId: String!
}

# ---- Queries ----

extend type Query {
  # findUsers: list users with optional filtering and pagination.
  # Accessible to both tenant developers and end-users (allowEndUser: true).
  # Pagination: skip default 0 max 1000; take default 20 max 50.
  findUsers(
    where: UserWhereInput
    skip: Int
    take: Int
  ): UserFindManyResult! @hasPermission(action: "end-user:read", allowEndUser: true)

  # me: returns the currently authenticated caller's user profile.
  # Accessible to end-users only (tenant callers have no end-user identity).
  me: UserFindOneResult! @hasPermission(action: "end-user:read", allowEndUser: true)
}

