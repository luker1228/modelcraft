# Cluster related types, inputs, queries and mutations

# ============================================
# Error interface (shared)
# ============================================

# Error interface for typed error handling
interface Error {
  message: String!
}

# ============================================
# Cluster Error Types
# ============================================

# Cluster-specific error types
type ClusterAlreadyExists implements Error {
  message: String!
  suggestion: String
}

type ClusterAlreadyExistsForProject implements Error {
  message: String!
  suggestion: String
}

type DatabaseConnectionFailed implements Error {
  message: String!
  suggestion: String
}

# Error unions for cluster operations
union GetClusterError = ResourceNotFound
union UpdateClusterError = ResourceNotFound | InvalidInput | DatabaseConnectionFailed
union DeleteClusterError = ResourceNotFound
union TestConnectionError = ResourceNotFound | DatabaseConnectionFailed

# ============================================
# Cluster Payload Types
# ============================================

type GetClusterPayload {
  cluster: DatabaseCluster
  error: GetClusterError
}

type UpdateClusterPayload {
  cluster: DatabaseCluster
  error: UpdateClusterError
}

type DeleteClusterPayload {
  success: Boolean!
  error: DeleteClusterError
}

type TestConnectionPayload {
  success: Boolean!
  connectionTime: Float # Connection time in milliseconds
  error: TestConnectionError
}

# ============================================
# Database Cluster Types
# ============================================

# Database connection information type
type DatabaseConnectionInfo {
  host: String!
  port: Int64!
  username: String!
  password: String! # Will be masked in responses
}

# Database: 集群直查返回的数据库（来自 information_schema.SCHEMATA）。
# 表示数据库集群中实际存在的所有 database（排除系统库）。
# 区别于 DatabaseLite — DatabaseLite 仅包含项目中已注册过模型的 database。
type Database {
  name: String!
}

# DatabaseLite: 已接管的数据库（来自 model_database 注册表）。
# 区别于 Database 类型 — Database 来自集群直查（information_schema），
# DatabaseLite 来自项目元数据（model_database 表），只包含项目已纳管的 database。
type DatabaseLite {
  name: String!
}

# 已接管数据库列表 — 查询 model_database 注册表，只返回项目已纳管的 database。
# 数据来源：项目元数据 model_database 表（非集群直查）。
# 对比 listDatabases：后者直连集群查询 information_schema，返回集群中全部数据库。
type RegisteredDatabasesPayload {
  databases: [DatabaseLite!]!
  totalCount: Int!
  page: Int!
  pageSize: Int!
}

union RegisteredDatabasesError = InvalidInput | ResourceNotFound

type GetRegisteredDatabasesPayload {
  data: RegisteredDatabasesPayload
  error: RegisteredDatabasesError
}

# Table info type
type TableInfo {
  name: String!
}

# Table list connection for pagination
type TableListConnection {
  items: [TableInfo!]!
  totalCount: Int!
}

# Database connection for pagination
type DatabaseConnection {
  edges: [DatabaseEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# Database edge for pagination
type DatabaseEdge {
  node: Database!
  cursor: String!
}

# DatabaseCluster type implementing Node interface
type DatabaseCluster implements Node {
  id: ID!
  projectSlug: String! # Project slug (orgName from context)
  title: String!
  description: String!
  connectionInfo: DatabaseConnectionInfo!
  connectionTimeout: Int!
  status: ClusterStatus!
  version: Int!
  createdAt: String!
  updatedAt: String!
  deletedAt: String
}

# Cluster status enum
enum ClusterStatus {
  ACTIVE
  DISABLED
}

# ============================================
# Cluster Input Types
# ============================================

# Database connection input type
input DatabaseConnectionInput {
  host: String!
  port: Int!
  username: String!
  password: String!
  connectionTimeout: Int
}

# Cluster connection input (used when creating a project)
input ClusterConnectionInput {
  title: String!
  description: String
  connectionInfo: DatabaseConnectionInput!
}

# Update cluster connection input (used when updating project's cluster)
input UpdateClusterConnectionInput {
  title: String
  description: String
  connectionInfo: DatabaseConnectionInput
  skipConnectionTest: Boolean # Default false; set true to skip connection validation
}

# 集群直查：查询 information_schema.SCHEMATA，返回集群中全部数据库（排除系统库）。
# 使用 relay 分页（offset/limit），返回 Database（非 DatabaseLite）。
input ListDatabasesInput {
  offset: Int
  limit: Int
  search: String # Search by database name
}

# 已接管数据库列表：查询 model_database 注册表，只返回已纳管的 database。
# 使用 page/pageSize 分页，返回 DatabaseLite。
input RegisteredDatabasesInput {
  search: String
  page: Int = 1
  pageSize: Int = 20
}

# List tables input type
input ListTablesInput {
  databaseName: String!
  excludeExisting: Boolean
  limit: Int
  offset: Int
}

# Test database connection input type (supports both existing cluster and direct connection info)
input TestDatabaseConnectionInput {
  connectionInfo: DatabaseConnectionInput # Optional: test direct connection info
}

# ============================================
# ProjectStatus Enum
# ============================================

# ProjectStatus enum
enum ProjectStatus {
  ACTIVE
  ARCHIVED
}

# ============================================
# Queries
# ============================================

extend type Query {
  # 已接管数据库列表：查询 model_database 注册表，只返回已纳管的 database。
  # 数据来源为项目元数据 model_database 表，非集群直查。
  # 场景：选择数据库来筛选模型（如 RLS 策略管理页、模型列表页）。
  registeredDatabases(input: RegisteredDatabasesInput): GetRegisteredDatabasesPayload! @hasPermission(action: "project:read", allowEndUser: true)
  databaseCluster: GetClusterPayload! @hasPermission(action: "project:read")
  # 集群数据库列表：直连数据库集群查询 information_schema.SCHEMATA。
  # 返回集群中实际存在的所有 database（排除系统库），无论是否已注册模型。
  # 场景：注册新数据库、查看集群中所有可用的 database。
  listDatabases(input: ListDatabasesInput!): DatabaseConnection! @hasPermission(action: "project:read")
  listTables(input: ListTablesInput!): TableListConnection! @hasPermission(action: "project:read")
}

# ============================================
# Mutations
# ============================================

extend type Mutation {
  updateProjectCluster(input: UpdateClusterConnectionInput!): UpdateClusterPayload! @hasPermission(action: "project:update")
  testDatabaseConnection(input: TestDatabaseConnectionInput!): TestConnectionPayload! @hasPermission(action: "project:read")
}
