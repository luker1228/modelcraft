openapi: "3.0.3"
info:
  title: ModelCraft REST API
  description: |
    REST API for tenant management (Auth & Organization) in the ModelCraft platform.

    Business domain APIs (Projects, Models, Clusters, Enums) are served exclusively
    via GraphQL at /org/{orgName}/design/graphql. This OpenAPI spec covers only identity and
    tenant-management endpoints.
  version: "3.0.0"

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - BearerAuth: []

paths:
  # ========================
  # Auth Endpoints
  # ========================
  /api/tenant/auth/register:
    $ref: "auth.yaml#/paths/~1api~1tenant~1auth~1register"
  /api/tenant/auth/login:
    $ref: "auth.yaml#/paths/~1api~1tenant~1auth~1login"
  /api/tenant/auth/logout:
    $ref: "auth.yaml#/paths/~1api~1tenant~1auth~1logout"
  /api/tenant/auth/refresh:
    $ref: "auth.yaml#/paths/~1api~1tenant~1auth~1refresh"

  # ========================
  # End-User Auth Endpoints
  # ========================
  /api/end-user/auth/login:
    $ref: "end-user-auth.yaml#/paths/~1api~1end-user~1auth~1login"
  /api/end-user/auth/register:
    $ref: "end-user-auth.yaml#/paths/~1api~1end-user~1auth~1register"
  /api/end-user/auth/logout:
    $ref: "end-user-auth.yaml#/paths/~1api~1end-user~1auth~1logout"
  /api/end-user/auth/refresh:
    $ref: "end-user-auth.yaml#/paths/~1api~1end-user~1auth~1refresh"
  /api/end-user/auth/me:
    $ref: "end-user-auth.yaml#/paths/~1api~1end-user~1auth~1me"

  # ========================
  # User Endpoints
  # ========================
  /api/user/memberships:
    $ref: "user.yaml#/paths/~1api~1user~1memberships"


components:
  securitySchemes:
    BearerAuth:
      $ref: "common.yaml#/securitySchemes/BearerAuth"

  schemas:
    # -- Common --
    BaseResponse:
      $ref: "common.yaml#/schemas/BaseResponse"
    SystemError:
      $ref: "common.yaml#/schemas/SystemError"
    AuthenticationFailedError:
      $ref: "common.yaml#/schemas/AuthenticationFailedError"
    UnauthorizedError:
      $ref: "common.yaml#/schemas/UnauthorizedError"

    # -- Auth --
    AuthInvalidInputError:
      $ref: "auth.yaml#/schemas/AuthInvalidInputError"
    PhoneAlreadyRegisteredError:
      $ref: "auth.yaml#/schemas/PhoneAlreadyRegisteredError"
    AuthenticationError:
      $ref: "auth.yaml#/schemas/AuthenticationError"
    RegisterRequest:
      $ref: "auth.yaml#/schemas/RegisterRequest"
    RegisterResponse:
      $ref: "auth.yaml#/schemas/RegisterResponse"
    LoginRequest:
      $ref: "auth.yaml#/schemas/LoginRequest"
    LoginResponse:
      $ref: "auth.yaml#/schemas/LoginResponse"
    RefreshResponse:
      $ref: "auth.yaml#/schemas/RefreshResponse"

    # -- End-User Auth --
    EndUserLoginRequest:
      $ref: "end-user-auth.yaml#/schemas/EndUserLoginRequest"
    EndUserRegisterRequest:
      $ref: "end-user-auth.yaml#/schemas/EndUserRegisterRequest"
    EndUserLogoutRequest:
      $ref: "end-user-auth.yaml#/schemas/EndUserLogoutRequest"
    EndUserRefreshRequest:
      $ref: "end-user-auth.yaml#/schemas/EndUserRefreshRequest"
    EndUserTokenResponse:
      $ref: "end-user-auth.yaml#/schemas/EndUserTokenResponse"
    EndUserLoginResponse:
      $ref: "end-user-auth.yaml#/schemas/EndUserLoginResponse"
    EndUserMeResponse:
      $ref: "end-user-auth.yaml#/schemas/EndUserMeResponse"
    EndUserProfile:
      $ref: "end-user-auth.yaml#/schemas/EndUserProfile"
    EndUserAccessibleProject:
      $ref: "end-user-auth.yaml#/schemas/EndUserAccessibleProject"
    EndUserAuthError:
      $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"

    # -- User --
    GetMembershipsResponse:
      $ref: "user.yaml#/components/schemas/GetMembershipsResponse"
    MembershipInfo:
      $ref: "user.yaml#/components/schemas/MembershipInfo"

