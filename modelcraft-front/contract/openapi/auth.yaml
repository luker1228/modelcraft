# Auth Domain - paths + schemas

paths:
  /api/tenant/auth/register:
    post:
      operationId: register
      summary: Register user and initialize profile atomically
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "auth.yaml#/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful (user + profile created)
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/RegisterResponse"
        "400":
          description: Invalid input (phone format, password too short)
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/AuthInvalidInputError"
        "409":
          description: phone or userName already exists
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "auth.yaml#/schemas/PhoneAlreadyRegisteredError"
                  - $ref: "auth.yaml#/schemas/UserNameAlreadyRegisteredError"
        "500":
          description: Profile init failed or internal error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

  /api/tenant/auth/login:
    post:
      operationId: login
      summary: Login with phone number and password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "auth.yaml#/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/LoginResponse"
        "400":
          description: Invalid input (phone format)
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/AuthInvalidInputError"
        "401":
          description: Authentication failed (phone not found or wrong password)
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/AuthenticationError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

  /api/tenant/auth/logout:
    post:
      operationId: logout
      summary: Logout (revoke refresh token via httpOnly cookie)
      tags: [Auth]
      security: []
      responses:
        "204":
          description: Logout successful

  /api/tenant/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh tokens using httpOnly cookie (rotation)
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/RefreshResponse"
        "401":
          description: Invalid, expired, or reused refresh token
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/AuthenticationError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

  /api/tenant/auth/whoami:
    get:
      operationId: whoami
      summary: Resolve current identity from a PAT token
      tags: [Auth]
      security: []
      responses:
        "200":
          description: PAT identity resolved
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/WhoamiResponse"
        "401":
          description: Invalid or expired PAT token
          content:
            application/json:
              schema:
                $ref: "auth.yaml#/schemas/WhoamiUnauthorizedError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

schemas:
  # -- Auth domain errors --
  AuthInvalidInputError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - PARAM_INVALID.AUTH
          message:
            type: string

  PhoneAlreadyRegisteredError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - CONFLICT.PHONE_ALREADY_EXISTS
          message:
            type: string

  UserNameAlreadyRegisteredError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - CONFLICT.USER_ALREADY_EXISTS
          message:
            type: string

  AuthenticationError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - AUTHENTICATION_FAILED
          message:
            type: string

  WhoamiUnauthorizedError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - UNAUTHENTICATED
          message:
            type: string

  # -- Auth request types --
  RegisterRequest:
    type: object
    required:
      - phone
      - password
      - userName
      - orgDisplayName
    properties:
      phone:
        type: string
        description: "11-digit mainland China phone number"
        pattern: "^1[3-9]\\d{9}$"
        example: "13800138000"
      password:
        type: string
        description: "Password (minimum 8 characters)"
        minLength: 8
        example: "mypassword123"
      userName:
        type: string
        description: "User name (3-32 chars, start with letter/underscore/hyphen, then alphanumeric/underscore/hyphen)"
        pattern: "^[a-zA-Z_-][a-zA-Z0-9_-]{2,31}$"
        minLength: 3
        maxLength: 32
        example: "john_doe"
      orgDisplayName:
        type: string
        description: "Organization display name (human-readable, e.g. '我的公司')"
        minLength: 1
        maxLength: 64
        example: "我的公司"
      organizationName:
        type: string
        description: "Optional organization name (slug). Auto-generated if omitted. 6-24 chars, lowercase letters/digits/underscores, must start with a letter."
        pattern: "^[a-z][a-z0-9_]{5,23}$"
        minLength: 6
        maxLength: 24
        example: "my_company"

  LoginRequest:
    type: object
    required:
      - phone
      - password
    properties:
      phone:
        type: string
        description: "11-digit mainland China phone number"
        pattern: "^1[3-9]\\d{9}$"
        example: "13800138000"
      password:
        type: string
        description: "User password"
        example: "mypassword123"

  # -- Auth response types --
  RegisterProfileSnapshot:
    type: object
    required:
      - id
      - userId
      - nickname
    properties:
      id:
        type: string
      userId:
        type: string
      nickname:
        type: string
        description: "default generated nickname, e.g. user_A1B2C3"
      avatarUrl:
        type: string
      bio:
        type: string

  RegisterResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        required:
          - userId
          - orgName
          - profile
        properties:
          userId:
            type: string
            description: "Created user UUID"
          orgName:
            type: string
            description: "Created personal organization slug"
          profile:
            $ref: "auth.yaml#/schemas/RegisterProfileSnapshot"

  LoginResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        required:
          - userId
          - accessToken
          - expiresIn
        properties:
          userId:
            type: string
            description: ModelCraft internal user UUID
          userName:
            type: string
            description: User display name
          orgName:
            type: string
            description: Primary organization name (first org the user belongs to, if any)
          accessToken:
            type: string
            description: Short-lived JWT access token
          expiresIn:
            type: integer
            description: Access token TTL in seconds

  RefreshResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        required:
          - accessToken
          - expiresIn
        properties:
          accessToken:
            type: string
            description: New short-lived JWT access token
          expiresIn:
            type: integer
            description: Access token TTL in seconds

  WhoamiResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        required:
          - userId
          - orgName
          - isAdmin
        properties:
          userId:
            type: string
          orgName:
            type: string
          isAdmin:
            type: boolean
