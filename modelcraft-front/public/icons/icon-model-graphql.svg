<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ModelCraft logo">
  <!--
    Hexagram: two equilateral triangles, center (12,12), circumradius = 9.5
    Up triangle:   top(12, 2.5)  bottom-right(20.72, 17.25)  bottom-left(3.28, 17.25)
    Down triangle: bottom(12,21.5) top-right(20.72, 6.75)    top-left(3.28, 6.75)
  -->
  <path d="M12 2.5L20.72 17.25H3.28Z"
        stroke="white" stroke-width="1.3" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <path d="M12 21.5L3.28 6.75H20.72Z"
        stroke="white" stroke-width="1.3" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Six vertex nodes -->
  <circle cx="12"    cy="2.5"  r="1.1" fill="white"/>
  <circle cx="20.72" cy="17.25" r="1.1" fill="white"/>
  <circle cx="3.28"  cy="17.25" r="1.1" fill="white"/>
  <circle cx="12"    cy="21.5" r="1.1" fill="white"/>
  <circle cx="20.72" cy="6.75"  r="1.1" fill="white"/>
  <circle cx="3.28"  cy="6.75"  r="1.1" fill="white"/>
  <!-- Center node -->
  <circle cx="12" cy="12" r="1.4" fill="white" opacity="0.85"/>
</svg>
