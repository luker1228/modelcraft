# depguard configuration for ModelCraft layered architecture
# This configuration enforces unidirectional dependencies between layers

depguard:
  rules:
    # Domain Layer: Must not depend on any other internal layer
    domain:
      files:
        - $all
        - "!$test"
      list-mode: lax
      deny:
        - pkg: "modelcraft/internal/app"
          desc: "Domain layer must not depend on Application layer"
        - pkg: "modelcraft/internal/infrastructure"
          desc: "Domain layer must not depend on Infrastructure layer"
        - pkg: "modelcraft/internal/interfaces"
          desc: "Domain layer must not depend on Interfaces layer"
      allow:
        - $gostd
        - modelcraft/pkg
        - modelcraft/internal/domain

    # Infrastructure Layer: May only depend on Domain
    infrastructure:
      files:
        - $all
        - "!$test"
      list-mode: lax
      deny:
        - pkg: "modelcraft/internal/app"
          desc: "Infrastructure layer must not depend on Application layer"
        - pkg: "modelcraft/internal/interfaces"
          desc: "Infrastructure layer must not depend on Interfaces layer"
      allow:
        - $gostd
        - modelcraft/pkg
        - modelcraft/internal/domain
        - modelcraft/internal/infrastructure

    # Application Layer: May depend on Domain and Infrastructure
    application:
      files:
        - $all
        - "!$test"
      list-mode: lax
      deny:
        - pkg: "modelcraft/internal/interfaces"
          desc: "Application layer must not depend on Interfaces layer"
      allow:
        - $gostd
        - modelcraft/pkg
        - modelcraft/internal/domain
        - modelcraft/internal/infrastructure
        - modelcraft/internal/app

    # Interfaces Layer: May depend on Application (but not Infrastructure directly)
    interfaces:
      files:
        - $all
        - "!$test"
      list-mode: lax
      allow:
        - $gostd
        - modelcraft/pkg
        - modelcraft/internal/app
        - modelcraft/internal/interfaces
