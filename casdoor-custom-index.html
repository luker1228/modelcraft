<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#2563eb"/>
  <meta name="description" content="ModelCraft - 现代化数据建模平台"/>
  <link rel="apple-touch-icon" href="https://cdn.casbin.org/img/favicon.png"/>
  <link rel="manifest" href="https://cdn.casbin.org/site/casdoor/manifest.json"/>
  <title>ModelCraft · 登录</title>

  <!-- Google Fonts: Inter + Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Casdoor original CSS (functional) -->
  <link href="/static/css/main.f35879a1.css" rel="stylesheet">

  <!-- ModelCraft Design Override -->
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; }

    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #fafafa;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Hide Casdoor branding & nav ===== */
    .ant-layout-header,
    .ant-menu,
    #top-language-select-container,
    .ant-layout-footer,
    footer {
      display: none !important;
    }

    /* ===== Full-page layout ===== */
    .ant-layout,
    .ant-layout-content {
      background: #fafafa !important;
      min-height: 100vh !important;
    }

    /* ===== Center login card ===== */
    #root > .ant-layout > .ant-layout-content {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      min-height: 100vh !important;
      padding: 24px !important;
      position: relative;
    }

    /* ===== Inject brand panel via pseudo ===== */
    #root > .ant-layout > .ant-layout-content::before {
      content: '';
      display: none;
    }

    /* ===== Login card wrapper ===== */
    .ant-card {
      border: 1px solid #e5e7eb !important;
      border-radius: 12px !important;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06) !important;
      background: #ffffff !important;
      max-width: 420px !important;
      width: 100% !important;
      overflow: hidden !important;
    }

    .ant-card-body {
      padding: 40px !important;
    }

    /* ===== Custom logo header (injected via JS) ===== */
    #mc-login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    #mc-login-header .mc-logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: #2563eb;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    #mc-login-header .mc-logo-wrap svg {
      width: 26px;
      height: 26px;
      color: #fff;
      stroke: #fff;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #mc-login-header h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #111827;
      margin: 0 0 6px 0;
      letter-spacing: -0.3px;
    }
    #mc-login-header p {
      font-size: 14px;
      color: #6b7280;
      margin: 0;
    }

    /* ===== Form Labels ===== */
    .ant-form-item-label > label {
      font-size: 13px !important;
      font-weight: 500 !important;
      color: #374151 !important;
      height: auto !important;
    }

    /* ===== Input fields ===== */
    .ant-input,
    .ant-input-affix-wrapper {
      border: 1px solid #e5e7eb !important;
      border-radius: 6px !important;
      height: 40px !important;
      font-size: 14px !important;
      color: #111827 !important;
      background: #ffffff !important;
      box-shadow: none !important;
      transition: border-color 0.2s !important;
      padding: 0 12px !important;
    }
    .ant-input:focus,
    .ant-input-affix-wrapper:focus,
    .ant-input-affix-wrapper-focused {
      border-color: #2563eb !important;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1) !important;
      outline: none !important;
    }
    .ant-input-affix-wrapper .ant-input {
      height: auto !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .ant-input-affix-wrapper {
      display: flex !important;
      align-items: center !important;
      padding: 0 12px !important;
      gap: 8px !important;
    }
    .ant-input-prefix, .ant-input-suffix {
      color: #9ca3af !important;
    }

    /* ===== Password input ===== */
    .ant-input-password {
      padding: 0 12px !important;
    }

    /* ===== Primary button ===== */
    .ant-btn-primary,
    button[type="submit"].ant-btn {
      background: #2563eb !important;
      border-color: #2563eb !important;
      border-radius: 6px !important;
      height: 40px !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #ffffff !important;
      box-shadow: none !important;
      transition: background 0.2s !important;
      letter-spacing: 0.01em;
    }
    .ant-btn-primary:hover,
    button[type="submit"].ant-btn:hover {
      background: #1d4ed8 !important;
      border-color: #1d4ed8 !important;
    }
    .ant-btn-primary:active,
    button[type="submit"].ant-btn:active {
      background: #1e40af !important;
      border-color: #1e40af !important;
    }

    /* ===== Default buttons ===== */
    .ant-btn:not(.ant-btn-primary):not(.ant-btn-link) {
      border: 1px solid #e5e7eb !important;
      border-radius: 6px !important;
      height: 40px !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      color: #374151 !important;
      background: #ffffff !important;
      box-shadow: none !important;
      transition: all 0.2s !important;
    }
    .ant-btn:not(.ant-btn-primary):not(.ant-btn-link):hover {
      border-color: #2563eb !important;
      color: #2563eb !important;
    }

    /* ===== Link buttons ===== */
    .ant-btn-link,
    a {
      color: #2563eb !important;
      transition: color 0.2s !important;
    }
    .ant-btn-link:hover, a:hover {
      color: #1d4ed8 !important;
      text-decoration: underline;
    }

    /* ===== Divider ===== */
    .ant-divider {
      border-color: #e5e7eb !important;
      margin: 20px 0 !important;
    }
    .ant-divider-inner-text {
      font-size: 12px !important;
      color: #9ca3af !important;
    }

    /* ===== Form item ===== */
    .ant-form-item {
      margin-bottom: 16px !important;
    }
    .ant-form-item:last-child {
      margin-bottom: 0 !important;
    }

    /* ===== Tabs (login/signup) ===== */
    .ant-tabs-nav {
      margin-bottom: 24px !important;
    }
    .ant-tabs-tab {
      font-size: 14px !important;
      font-weight: 500 !important;
      color: #6b7280 !important;
      padding: 8px 0 !important;
    }
    .ant-tabs-tab-active .ant-tabs-tab-btn {
      color: #2563eb !important;
      font-weight: 600 !important;
    }
    .ant-tabs-ink-bar {
      background: #2563eb !important;
    }
    .ant-tabs-tab:hover .ant-tabs-tab-btn {
      color: #2563eb !important;
    }

    /* ===== Checkbox ===== */
    .ant-checkbox-checked .ant-checkbox-inner {
      background-color: #2563eb !important;
      border-color: #2563eb !important;
    }
    .ant-checkbox:hover .ant-checkbox-inner {
      border-color: #2563eb !important;
    }
    .ant-checkbox-wrapper {
      font-size: 13px !important;
      color: #6b7280 !important;
    }

    /* ===== Alert / error messages ===== */
    .ant-alert-error {
      background: #fef2f2 !important;
      border: 1px solid #fecaca !important;
      border-radius: 6px !important;
    }
    .ant-alert-error .ant-alert-message {
      color: #dc2626 !important;
      font-size: 13px !important;
    }

    /* ===== Social login buttons ===== */
    .ant-btn.social-btn,
    [class*="social"] .ant-btn {
      border: 1px solid #e5e7eb !important;
      border-radius: 6px !important;
      background: #ffffff !important;
      color: #374151 !important;
    }
    [class*="social"] .ant-btn:hover {
      border-color: #2563eb !important;
      color: #2563eb !important;
    }

    /* ===== Verification code input ===== */
    .ant-input-group-addon {
      border: 1px solid #e5e7eb !important;
      border-radius: 0 6px 6px 0 !important;
      background: #f9fafb !important;
    }
    .ant-input-group > .ant-input {
      border-radius: 6px 0 0 6px !important;
    }

    /* ===== Loading spinner ===== */
    .ant-spin-dot-item {
      background-color: #2563eb !important;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f3f4f6; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* ===== Background decoration ===== */
    #root > .ant-layout > .ant-layout-content::after {
      content: 'ModelCraft';
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #9ca3af;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* ===== Mobile adjustments ===== */
    @media (max-width: 480px) {
      .ant-card-body {
        padding: 28px 20px !important;
      }
    }
  </style>
</head>
<body>
  <noscript>需要启用 JavaScript 才能运行此应用。</noscript>
  <div id="root"></div>

  <!-- Casdoor original JS (functional) -->
  <script defer="defer" src="/static/js/main.0a2e247e.js"></script>

  <!-- ModelCraft branding injection -->
  <script>
    (function() {
      // Wait for Casdoor React app to mount, then inject custom header
      function injectHeader() {
        var card = document.querySelector('.ant-card-body');
        if (!card) return;

        // Avoid duplicate injection
        if (document.getElementById('mc-login-header')) return;

        var header = document.createElement('div');
        header.id = 'mc-login-header';
        header.innerHTML = [
          '<div class="mc-logo-wrap">',
          '  <svg viewBox="0 0 24 24" aria-hidden="true">',
          '    <path d="M12 3L2 7l10 4 10-4-10-4z"/>',
          '    <path d="M2 17l10 4 10-4"/>',
          '    <path d="M2 12l10 4 10-4"/>',
          '  </svg>',
          '</div>',
          '<h1>ModelCraft</h1>',
          '<p>登录以访问您的工作空间</p>'
        ].join('');

        // Insert before first child of card body
        card.insertBefore(header, card.firstChild);

        // Hide default Casdoor title if present
        var casdoorTitle = card.querySelector('.login-panel > .login-title');
        if (casdoorTitle) casdoorTitle.style.display = 'none';
      }

      // Poll until React renders the card
      var attempts = 0;
      var interval = setInterval(function() {
        injectHeader();
        attempts++;
        if (document.getElementById('mc-login-header') || attempts > 100) {
          clearInterval(interval);
        }
      }, 100);

      // Also observe DOM changes
      if (window.MutationObserver) {
        var observer = new MutationObserver(function() {
          injectHeader();
        });
        observer.observe(document.getElementById('root'), {
          childList: true,
          subtree: true
        });
      }
    })();
  </script>
</body>
</html>
