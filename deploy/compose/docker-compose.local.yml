services:
  backend:
    build:
      context: ../../modelcraft-backend
      dockerfile: Dockerfile
    image: modelcraft-backend:local
    container_name: modelcraft-backend
    env_file:
      - ../env/backend.local.env
    ports:
      - "8080:8080"
    volumes:
      - ../../modelcraft-backend/data:/app/data
      - ../../modelcraft-backend/configs:/app/configs
      - backend_logs:/app/logs
    depends_on:
      modelcraft-mysql:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: modelcraft-apisix
    env_file:
      - ../env/apisix.local.env
    ports:
      - "9080:9080"
      - "9180:9180"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ../../apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9080/ >/dev/null || curl -s http://localhost:9080/api/tenant/auth/login >/dev/null; exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  modelcraft-agent:
    build:
      context: ../../modelcraft-agent
      dockerfile: Dockerfile
    image: modelcraft-agent:local
    container_name: modelcraft-agent
    env_file:
      - ../env/agent.local.env
    ports:
      - "8000:8000"
    command: >
      sh -c "mkdir -p /app/logs &&
             python -m uvicorn main:app --host 0.0.0.0 --port 8000 2>&1 | tee -a /app/logs/agent.log"
    depends_on:
      apisix:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ../../modelcraft-front
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://apisix:9080
    image: modelcraft-frontend:local
    container_name: modelcraft-frontend
    env_file:
      - ../env/frontend.local.env
    ports:
      - "3100:3000"
    depends_on:
      apisix:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  modelcraft-mysql:
    image: mysql:8.0
    container_name: modelcraft-mysql
    env_file:
      - ../env/mysql.local.env
    ports:
      - "6033:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../modelcraft-backend/db/schema/mysql:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # modelcraft-redis:  # 暂时屏蔽，当前服务不依赖 Redis
  #   image: redis:7-alpine
  #   container_name: modelcraft-redis
  #   env_file:
  #     - ../env/redis.local.env
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
  #   networks:
  #     - modelcraft-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: modelcraft-phpmyadmin
    env_file:
      - ../env/phpmyadmin.local.env
    ports:
      - "8081:80"
    depends_on:
      modelcraft-mysql:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  mysql_data:
  # redis_data:  # 暂时屏蔽
  backend_logs:

networks:
  modelcraft-network:
    driver: bridge
