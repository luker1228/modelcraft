  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 30s

  modelcraft-mysql:
    image: mysql:8.0
    container_name: modelcraft-mysql
    env_file:
      - ../env/mysql.local.env
    ports:
      - "6033:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../modelcraft-backend/db/schema/mysql:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # modelcraft-redis:  # 暂时屏蔽，当前服务不依赖 Redis
