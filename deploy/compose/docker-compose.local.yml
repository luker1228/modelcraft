  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: modelcraft-phpmyadmin
    env_file:
      - ../env/phpmyadmin.local.env
    ports:
      - "8081:80"
    depends_on:
      modelcraft-mysql:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  mysql_data:
  # redis_data:  # 暂时屏蔽
  backend_logs:
  etcd_data:

networks:
  modelcraft-network:
    driver: bridge
