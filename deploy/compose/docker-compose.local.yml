services:
  backend:
    build:
      context: ../../modelcraft-backend
      dockerfile: Dockerfile
    image: modelcraft-backend:local
    container_name: modelcraft-backend
    env_file:
      - ../env/backend.local.env
    ports:
      - "8080:8080"
    volumes:
      - ../../modelcraft-backend/data:/app/data
      - ../../modelcraft-backend/configs:/app/configs
      - backend_logs:/app/logs
    depends_on:
      modelcraft-mysql:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  etcd:
    image: bitnami/etcd:3.5
    container_name: modelcraft-etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: modelcraft-apisix
    env_file:
      - ../env/apisix.local.env
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ../../apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ../../apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  modelcraft-agent:
    build:
      context: ../../modelcraft-agent
      dockerfile: Dockerfile
    image: modelcraft-agent:local
    container_name: modelcraft-agent
    env_file:
      - ../env/agent.local.env
    ports:
      - "8000:8000"
    depends_on:
      apisix:
        condition: service_healthy
    networks:
      - modelcraft-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # frontend:  # 暂时屏蔽，前端调试中
