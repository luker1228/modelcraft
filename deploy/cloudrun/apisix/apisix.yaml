#
# APISIX standalone declarative configuration.
# Loaded directly — no Admin API calls needed.
# Restart the APISIX container after any change to this file.
#
# JWT verification is done via serverless-pre-function (Lua + resty.jwt),
# because APISIX's built-in jwt-auth requires both public_key and private_key
# for asymmetric algorithms, but we only have the public key here.
#

global_rules:
  - id: observability-tracing
    plugins:
      opentelemetry: {}

routes:
  # ── Public routes: auth endpoints, no JWT required ──────────────────────────
  - id: tenant-auth
    uri: /api/tenant/auth/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "http://localhost:3000"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id,X-Client-Request-Id"
        expose_headers: "X-Request-Id"
        allow_credential: true
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  # ── Protected routes: ES256 JWT verification + X-User-ID injection ──────────
  - id: enduser-graphql
    uri: /end-user/graphql/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "http://localhost:3000"
        allow_methods: "POST,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id,X-Client-Request-Id,X-Action"
        expose_headers: "X-Request-Id"
        allow_credential: true
      request-id:
        header_name: X-Request-Id
        include_in_response: true
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              local core = require("apisix.core")
              local jwt  = require("resty.jwt")
              local http = require("resty.http")

              local PUB_KEY = "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEw1SV3/9qLTugs2eF1dw963KpTNtk\ntbdCtuciyI3OJ01MclvPTFE/Thqti3TegWLdaxidmpPQ5pemawUXIqu6Yg==\n-----END PUBLIC KEY-----"

              local auth_header = core.request.header(ctx, "Authorization")
              local request_id = core.request.header(ctx, "X-Request-Id")
              if not auth_header then
                core.response.exit(401, {message = "Authorization header required"})
                return
              end

              local token = auth_header:match("Bearer%s+(.+)")
              if not token then
                core.response.exit(401, {message = "Bearer token required"})
                return
              end

              -- PAT token: mc_pat_* → validate via backend whoami, get JWT, inject identity
              if token:sub(1, 7) == "mc_pat_" then
                core.log.warn("[PAT] start validation request_id=", request_id, " uri=", ctx.var.uri)
                local httpc = http.new()
                httpc:set_timeout(3000)
                local res, err = httpc:request_uri("http://backend:8080/api/tenant/auth/whoami", {
                  method  = "GET",
                  headers = {
                    ["Authorization"] = auth_header,
                    ["X-Request-Id"] = request_id,
                  },
                  keepalive = false,
                })
                if err or not res or res.status ~= 200 then
                  local status = res and res.status or "nil"
                  local body = res and res.body or ""
                  if #body > 300 then
                    body = body:sub(1, 300)
                  end
                  core.log.error("[PAT] whoami subrequest failed request_id=", request_id, " err=", err or "nil", " status=", status, " body=", body)
                  local failed_request_id = request_id
                  local err_message = "Invalid or expired PAT token"
                  if res and res.body then
                    local cjson = require("cjson")
                    local ok, payload = pcall(cjson.decode, res.body)
                    if ok and payload then
                      if payload.requestId then
                        failed_request_id = payload.requestId
                      end
                      if payload.error and payload.error.message then
                        err_message = payload.error.message
                      end
                    end
                  end
                  core.response.exit(401, {message = err_message, requestId = failed_request_id})
                  return
                end
                local cjson = require("cjson")
                local ok, payload = pcall(cjson.decode, res.body)
                if not ok or not payload or not payload.userId then
                  local body = res and res.body or ""
                  if #body > 300 then
                    body = body:sub(1, 300)
                  end
                  core.log.error("[PAT] whoami response missing userId request_id=", request_id, " status=", res and res.status or "nil", " body=", body)
                  core.response.exit(401, {message = "PAT validation failed", requestId = request_id})
                  return
                end
                core.log.info("[PAT] whoami validation ok request_id=", request_id, " user_id=", payload.userId, " org_name=", payload.orgName or "", " is_admin=", tostring(payload.isAdmin == true))
                core.request.set_header(ctx, "X-User-ID",   payload.userId)
                if payload.isAdmin then
                  core.request.set_header(ctx, "X-Is-Admin", "true")
                else
                  core.request.set_header(ctx, "X-Is-Admin", "false")
                end
                if payload.orgName then
                  core.request.set_header(ctx, "X-Org-Name", payload.orgName)
                end
                -- Replace raw PAT with short-lived JWT from whoami.
                -- The backend never sees the long-lived PAT on design-time GraphQL routes.
                if payload.accessToken then
                  core.request.set_header(ctx, "Authorization", "Bearer " .. payload.accessToken)
                end
                return
              end

              -- JWT token: verify signature and inject identity
              local jwt_obj = jwt:verify(PUB_KEY, token)
              if not jwt_obj or not jwt_obj.verified then
                local msg = (jwt_obj and jwt_obj.reason == "jwt expired") and "Token expired" or "Invalid token"
                core.response.exit(401, {message = msg})
                return
              end

              local payload = jwt_obj.payload
              if not payload then
                core.response.exit(401, {message = "Invalid token payload"})
                return
              end

              -- Inject end-user identity
              if payload.user_id then
                core.request.set_header(ctx, "X-User-ID", payload.user_id)
              end
              if payload.org_name then
                core.request.set_header(ctx, "X-Org-Name", payload.org_name)
              end
              if payload.is_admin then
                core.request.set_header(ctx, "X-Is-Admin", "true")
              else
                core.request.set_header(ctx, "X-Is-Admin", "false")
              end
            end

