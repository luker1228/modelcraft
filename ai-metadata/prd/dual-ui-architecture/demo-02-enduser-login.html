<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo: 用户端登录页 /end-user/[orgName]/login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }

  .demo-bar { background: #0f172a; color: #7dd3fc; font-size: 12px; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; }
  .demo-bar strong { color: #fff; }
  .demo-tag { background: #0284c7; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

  .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); padding: 40px 36px; width: 100%; max-width: 400px; }

  .org-header { text-align: center; margin-bottom: 32px; }
  .org-badge { display: inline-block; background: #eff6ff; color: #1d4ed8; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  .org-title { font-size: 20px; font-weight: 600; color: #0f172a; }
  .org-sub { font-size: 13px; color: #64748b; margin-top: 4px; }

  label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .field { margin-bottom: 18px; }
  input[type=text], input[type=password] {
    width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 7px;
    font-size: 14px; color: #111; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  input.error { border-color: #ef4444; }

  .btn-login { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 7px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
  .btn-login:hover { background: #1d4ed8; }
  .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }

  .error-msg { display: none; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; padding: 10px 12px; color: #dc2626; font-size: 13px; margin-bottom: 16px; }
  .error-msg.show { display: block; }

  .annotation { background: #fef9c3; border: 1px dashed #f59e0b; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #92400e; margin-top: 20px; line-height: 1.6; }
  .annotation b { color: #b45309; }

  .scenario-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .scenario-btns button { font-size: 11px; padding: 4px 10px; border: 1px solid #d1d5db; background: #f9fafb; border-radius: 5px; cursor: pointer; color: #374151; }
  .scenario-btns button:hover { background: #f3f4f6; }
  .scenario-label { font-size: 11px; color: #9ca3af; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="demo-bar">
  <span><strong>Demo</strong> — 用户端登录页</span>
  <span>路由: <code>/end-user/acme/login</code> &nbsp;|&nbsp; <span class="demo-tag">低保真 · 流程对齐</span></span>
</div>

<div class="page">
  <div style="width:100%;max-width:400px;">

    <div class="scenario-label">▸ 快速切换场景（Demo 用）：</div>
    <div class="scenario-btns">
      <button onclick="setScenario('success')">✓ 登录成功</button>
      <button onclick="setScenario('wrong')">✗ 密码错误</button>
      <button onclick="setScenario('disabled')">✗ 账号已禁用</button>
      <button onclick="setScenario('no-org')">✗ Org 不存在</button>
    </div>

    <div class="card">
      <div class="org-header">
        <div class="org-badge">acme</div>
        <div class="org-title">ACME 内部平台</div>
        <div class="org-sub">请使用您的账号密码登录</div>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <form onsubmit="handleLogin(event)">
        <div class="field">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="输入用户名" autocomplete="username">
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" id="btn-login" type="submit">登录</button>
      </form>

      <div class="annotation">
        <b>登录流程：</b> POST <code>/api/bff/org/[orgName]/end-user/auth/login</code><br>
        成功 → 颁发 <code>aud=end-user</code> Token（httpOnly cookie）→ 跳转 <code>/end-user/acme/workspace</code><br>
        <b>无论 Project 数量多少，统一跳 Workspace（0/1/N 均一致）</b>
      </div>
    </div>
  </div>
</div>

<script>
let scenario = 'success';

function setScenario(s) {
  scenario = s;
  document.getElementById('error-msg').className = 'error-msg';
  document.getElementById('username').value = s === 'success' ? 'alice' : s === 'wrong' ? 'alice' : s === 'disabled' ? 'bob' : 'unknown';
  document.getElementById('password').value = s === 'success' ? 'correctpass' : 'wrongpass';
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('error-msg');
  errEl.className = 'error-msg';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) {
    errEl.textContent = '请填写用户名和密码';
    errEl.className = 'error-msg show';
    return;
  }

  btn.disabled = true;
  btn.textContent = '登录中...';

  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '登录';
    if (scenario === 'success') {
      alert('[ Demo ] 登录成功\naud=end-user Token 已写入 httpOnly cookie\n跳转 → /end-user/acme/workspace');
    } else if (scenario === 'wrong') {
      errEl.textContent = '用户名或密码错误';
      errEl.className = 'error-msg show';
    } else if (scenario === 'disabled') {
      errEl.textContent = '账号已被管理员禁用，请联系管理员';
      errEl.className = 'error-msg show';
    } else if (scenario === 'no-org') {
      errEl.textContent = '组织不存在，请检查链接';
      errEl.className = 'error-msg show';
    }
  }, 800);
}
</script>
</body>
</html>
