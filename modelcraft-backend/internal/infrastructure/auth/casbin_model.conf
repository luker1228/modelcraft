# Casbin RBAC Model Configuration for ModelCraft
# This model implements Role-Based Access Control with a simplified three-element tuple.
#
# Design:
# - Multi-tenancy is handled at application layer via org_name filtering
# - No domain field in Casbin model (keeps configuration simple)
# - System roles have hardcoded permissions loaded at startup
# - Custom roles have permissions stored in database

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && (p.obj == "*" || r.obj == p.obj) && (p.act == "*" || r.act == p.act)
