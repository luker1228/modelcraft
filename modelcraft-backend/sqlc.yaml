version: "2"
sql:
  - engine: "mysql"
    queries:
      - "db/queries/"
      - "db/queries/rbac/"
    schema: "db/schema/mysql/"
    gen:
      go:
        package: "dbgen"
        out: "internal/infrastructure/dbgen"
        emit_interface: true
        emit_db_tags: false
        emit_json_tags: false
        overrides:
          - db_type: "json"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true
          - db_type: "json"
            nullable: false
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "tinyint(1)"
            go_type: "bool"
