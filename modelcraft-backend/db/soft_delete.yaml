default_mode: enabled
timestamp_unit: unix_milli
annotations:
  include_deleted: "@include_deleted"
  only_deleted: "@only_deleted"
  physical_delete: "@physical_delete"
lint_paths:
  - "db/queries/**/*.sql"
blacklist_tables:
  - refresh_tokens
  - api_keys
  - security_audit_logs
  - project_auth_configs
  - project_auth_schemas
  - model_rls_policies
  - model_field_enum_associations
  - user_organizations
  - user_roles
  - role_permissions
  - end_user_accounts
  - end_user_role_users
delete_token_tables:
  - organizations
  - users
  - profile
  - projects
  - database_clusters
  - models
  - model_groups
  - logical_foreign_keys
  - model_enums
  - field_definitions
  - roles
  - end_user_users
  - user_orgs
