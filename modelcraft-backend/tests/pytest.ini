[pytest]
# Test discovery
testpaths = design runtime
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    design: Design-time tests (model design, cluster config, project management)
    runtime: Runtime tests (data queries, GraphQL execution)
    integration: Integration tests spanning multiple components
    slow: Tests that take more than 5 seconds

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
