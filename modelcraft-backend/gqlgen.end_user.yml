schema:
  - api/graph/end_user/schema/*.graphql

exec:
  package: generated
  filename: internal/interfaces/graphql/enduser/generated/generated.go

model:
  filename: internal/interfaces/graphql/enduser/generated/model_gen.go
  package: generated

resolver:
  package: endusergraphql
  layout: follow-schema
  dir: internal/interfaces/graphql/enduser
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int32
  Int64:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
