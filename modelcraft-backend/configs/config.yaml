server:
  port: "8080"
  mode: "debug"

# 平台数据库配置（设计时数据库）
# IMPORTANT: 敏感信息通过环境变量或 .env 文件覆盖
database:
  type: "mysql"
  # MySQL配置 - 支持环境变量覆盖：DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, DB_DATABASE
  host: "localhost"  # 默认本地开发，Docker 环境需要覆盖为服务名
  port: 3306
  username: "root"
  password: ""  # MUST override via DB_PASSWORD environment variable or .env file
  database: "mc_meta"
  charset: "utf8mb4"
  # 连接池配置
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600
  log_level: "info"
  # 是否在启动时自动迁移数据库（默认true）
  migrate_on_startup: true

redis:
  host: "localhost"  # Docker 环境需要覆盖为服务名
  port: 6379
  password: ""  # Override via REDIS_PASSWORD if needed

jwt:
  secret: "modelcraft_dev_secret_please_change_in_production"  # Override via JWT_SECRET environment variable in production
  expiration: 21600s  # Token 过期时间（time.Duration 格式: 21600s = 6h = 6小时）
  issuer: "modelcraft"  # JWT 发行者，必须为 "modelcraft"

# 认证配置
auth:
  # 内网 HTTP 接口共享令牌（X-Internal-Token）
  internal_token: ""  # Override via INTERNAL_TOKEN

  # 刷新令牌 Set-Cookie 属性配置
  cookie:
    domain: ""          # 留空则使用请求主机；生产环境按需配置
    secure: false       # 安全标志；生产环境应设为 true（HTTPS）；通过 AUTH_COOKIE_SECURE=true 覆盖
    same_site: "strict" # "strict" | "lax" | "none"

  # 设计时 API 认证配置（GraphQL Design API + REST API）
  design:
    # 是否启用认证（开发环境可设为false，生产环境必须为true）
    enabled: false  # Set to true in production
    # JWT 公钥路径
    jwt_public_key_path: ""  # Path to RSA public key file (PEM format)
    # 或者直接配置公钥内容（通过环境变量）
    jwt_public_key: ""  # Override via AUTH_JWT_PUBLIC_KEY
    # 是否接受 ModelCraft JWT
    accept_modelcraft_jwt: true

  # 运行态 GraphQL API 认证配置
  runtime:
    # 是否启用认证（开发环境可设为false，生产环境必须为true）
    enabled: true
    # 是否允许特定项目跳过认证（用于迁移期间，生产环境应为空数组）
    optional_for_projects: []  # e.g., ["default"] to allow unauthenticated access for default project

# 加密配置
crypto:
  aes_key: ""  # MUST override via CRYPTO_AES_KEY environment variable or .env file (32 bytes required)

logger:
  level: "info"
  output_path: "logs/server.log"  # Default to file logging, override with LOG_OUTPUT_PATH=stdout for console
  max_size: 100
  max_backups: 10
  max_age: 7
  compress: true
