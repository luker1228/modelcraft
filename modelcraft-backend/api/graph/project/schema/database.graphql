# Database management types, inputs, queries and mutations
# Note: InvalidInput is defined in field.graphql, ResourceNotFound in base.graphql

# ============================================
# Enums
# ============================================

enum DatabaseMode {
  SELF_HOSTED
  MANAGED
}

enum ModelDatabaseSyncJobStatus {
  PENDING
  RUNNING
  SUCCEEDED
  PARTIAL_SUCCESS
  FAILED
}

# ============================================
# Types
# ============================================

type ModelDatabase {
  id: ID!
  name: String!
  title: String!
  description: String!
  mode: DatabaseMode!
  latestSyncJobId: ID
  createdAt: Time!
  updatedAt: Time!
}

type RawDatabase {
  name: String!
  isRegistered: Boolean!
}

type ModelDatabaseSyncFailedTable {
  tableName: String!
  message: String!
}

type ModelDatabaseSyncJob {
  id: ID!
  databaseId: ID!
  status: ModelDatabaseSyncJobStatus!
  totalTables: Int!
  processedTables: Int!
  createdModels: Int!
  syncedModels: Int!
  failedCount: Int!
  failedTables: [ModelDatabaseSyncFailedTable!]!
  startedAt: Time
  finishedAt: Time
  createdAt: Time!
  updatedAt: Time!
}

type StartModelDatabaseSyncPayload {
  job: ModelDatabaseSyncJob!
}

# ============================================
# Input Types
# ============================================

input RegisterModelDatabaseInput {
  name: String!
  title: String!
  description: String
  mode: DatabaseMode!
}

input UpdateModelDatabaseInput {
  title: String
  description: String
  mode: DatabaseMode
}

input BatchRegisterModelDatabaseInput {
  databases: [RegisterModelDatabaseInput!]!
}

# ============================================
# Result / Error Unions
# ============================================

union RegisterModelDatabaseResult = ModelDatabase | InvalidInput | ResourceNotFound

type BatchRegisterModelDatabaseResult {
  succeeded: [ModelDatabase!]!
  failed: [BatchRegisterError!]!
}

type BatchRegisterError {
  name: String!
  message: String!
}

# ============================================
# Queries
# ============================================

extend type Query {
  modelDatabases: [ModelDatabase!]!
  clusterRawDatabases: [RawDatabase!]!
  modelDatabaseSyncJob(jobId: ID!): ModelDatabaseSyncJob @deprecated(reason: "Use modelSyncJobs")
}

# ============================================
# Mutations
# ============================================

extend type Mutation {
  registerModelDatabase(input: RegisterModelDatabaseInput!): RegisterModelDatabaseResult!
  batchRegisterModelDatabases(input: BatchRegisterModelDatabaseInput!): BatchRegisterModelDatabaseResult!
  updateModelDatabase(id: ID!, input: UpdateModelDatabaseInput!): ModelDatabase!
  unregisterModelDatabase(id: ID!): Boolean!
  startModelDatabaseSync(databaseId: ID!): StartModelDatabaseSyncPayload! @deprecated(reason: "Use startModelSync")
}
