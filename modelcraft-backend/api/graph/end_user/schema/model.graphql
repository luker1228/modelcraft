# End-user model detail query (subset of project-domain model query).
# Used by shared model workspace in end-user pages.

type EndUserField {
  name: String!
  isDeprecated: Boolean!
}

type EndUserModel {
  id: ID!
  name: String!
  title: String!
  description: String!
  databaseName: String!
  jsonSchema: String
  fields: [EndUserField!]!
}

type EndUserModelNotFound implements Error {
  message: String!
}

union EndUserGetModelError = EndUserModelNotFound | InvalidInput | ProjectNotFound

type EndUserGetModelPayload {
  model: EndUserModel
  error: EndUserGetModelError
}

extend type Query {
  model(id: ID!): EndUserGetModelPayload!
}
