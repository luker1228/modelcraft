# End-User GraphQL schema is a strict subset for runtime data access.
# It intentionally excludes model-design capabilities.

type Query {
  _empty: String
}

interface Error {
  message: String!
}

type InvalidInput implements Error {
  message: String!
}

type Unauthorized implements Error {
  message: String!
}

type ProjectNotFound implements Error {
  message: String!
}
