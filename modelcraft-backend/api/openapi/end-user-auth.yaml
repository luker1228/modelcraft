# End-User Auth Domain - paths + schemas
# 终端用户认证：登录、注册、登出、刷新、选择项目、查询自身信息
# 对称 auth.yaml（开发者认证），路径前缀 /api/end-user/auth
#
# 设计原则：
#   - orgName 不在路径中，从请求 body 或 Bearer JWT 的 org_name 字段读取
#   - /me 纯 Bearer Token 路由：后端验签 JWT，从 sub/org_name 字段提取身份
#   - gateway 对所有端点做简单透传，不持有 end-user JWT secret

paths:
  /api/end-user/auth/login:
    post:
      operationId: endUserLogin
      summary: End-user login with username and password
      tags: [EndUserAuth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "end-user-auth.yaml#/schemas/EndUserLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserLoginResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"
        "401":
          description: Invalid credentials or account disabled
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

  /api/end-user/auth/register:
    post:
      operationId: endUserRegister
      summary: End-user self-registration
      tags: [EndUserAuth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "end-user-auth.yaml#/schemas/EndUserRegisterRequest"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserTokenResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"
        "401":
          description: Registration not allowed (cluster not configured)
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

  /api/end-user/auth/logout:
    post:
      operationId: endUserLogout
      summary: End-user logout (revoke refresh token via httpOnly cookie)
      tags: [EndUserAuth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "end-user-auth.yaml#/schemas/EndUserLogoutRequest"
      responses:
        "204":
          description: Logout successful

  /api/end-user/auth/refresh:
    post:
      operationId: endUserRefreshToken
      summary: Refresh end-user access token using httpOnly refresh cookie
      tags: [EndUserAuth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "end-user-auth.yaml#/schemas/EndUserRefreshRequest"
      responses:
        "200":
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserTokenResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

  /api/end-user/auth/me:
    get:
      operationId: endUserMe
      summary: Get current end-user profile (resolved from Bearer JWT)
      tags: [EndUserAuth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: End-user profile
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserMeResponse"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: "end-user-auth.yaml#/schemas/EndUserAuthError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

schemas:
  # ---- Request types ----

  EndUserLoginRequest:
    type: object
    required:
      - username
      - password
    properties:
      orgName:
        type: string
        description: Optional organization slug. When omitted, the backend resolves it from the username.
        example: my-org
      projectSlug:
        type: string
        description: Optional project slug for single-project login flow
        example: my-project
      username:
        type: string
        example: alice
      password:
        type: string
        example: s3cr3t

  EndUserRegisterRequest:
    type: object
    required:
      - orgName
      - projectSlug
      - username
      - password
    properties:
      orgName:
        type: string
        example: my-org
      projectSlug:
        type: string
        example: my-project
      username:
        type: string
        example: alice
      password:
        type: string
        example: s3cr3t

  EndUserLogoutRequest:
    type: object
    properties:
      orgName:
        type: string
        example: my-org

  EndUserRefreshRequest:
    type: object
    properties:
      orgName:
        type: string
        description: Required to locate the correct tenant DB for session lookup
        example: my-org

  # ---- Response types ----

  EndUserAccessibleProject:
    type: object
    required:
      - slug
      - title
    properties:
      slug:
        type: string
      title:
        type: string

  EndUserTokenResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        required:
          - userId
          - accessToken
          - expiresIn
        properties:
          userId:
            type: string
          accessToken:
            type: string
            description: Short-lived JWT access token
          expiresIn:
            type: integer
            description: Access token TTL in seconds
          expiresAt:
            type: string
            format: date-time
          orgName:
            type: string
            description: Resolved organization slug for the authenticated end-user
          projects:
            type: array
            items:
              $ref: "end-user-auth.yaml#/schemas/EndUserAccessibleProject"
            description: Accessible projects (returned on login when projectSlug not specified)

  EndUserLoginResponse:
    allOf:
      - $ref: "end-user-auth.yaml#/schemas/EndUserTokenResponse"

  EndUserMeResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        required:
          - endUser
        properties:
          endUser:
            $ref: "end-user-auth.yaml#/schemas/EndUserProfile"

  EndUserProfile:
    type: object
    required:
      - id
      - username
      - isForbidden
    properties:
      id:
        type: string
      username:
        type: string
      isForbidden:
        type: boolean
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

  # ---- Error types ----

  EndUserAuthError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            description: "Error code, e.g. AUTHENTICATION_FAILED, OPERATION_DENIED.END_USER"
          message:
            type: string
