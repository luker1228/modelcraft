# Organization Domain - paths + schemas

paths:
  /api/org/init:
    post:
      operationId: initOrganization
      summary: Initialize organization for the current user (idempotent)
      tags: [Organization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "org.yaml#/schemas/InitOrganizationRequest"
      responses:
        "200":
          description: Organization initialized (created or already exists)
          content:
            application/json:
              schema:
                $ref: "org.yaml#/schemas/InitOrganizationResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "org.yaml#/schemas/OrgInvalidInputError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/AuthenticationFailedError"
        "409":
          description: Organization name conflict (name taken by another org)
          content:
            application/json:
              schema:
                $ref: "org.yaml#/schemas/OrgAlreadyExistsError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/SystemError"

schemas:
  # -- Organization domain errors --
  OrgInvalidInputError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - PARAM_INVALID.ORGANIZATION
          message:
            type: string

  OrgAlreadyExistsError:
    type: object
    required:
      - requestId
      - error
    properties:
      requestId:
        type: string
      error:
        type: object
        required:
          - code
          - message
        properties:
          code:
            type: string
            enum:
              - CONFLICT.ORGANIZATION
          message:
            type: string

  # -- Organization request types --
  InitOrganizationRequest:
    type: object
    properties:
      organizationName:
        type: string
        description: "Organization slug (6-24 chars, lowercase, no hyphens). If empty, auto-generated from displayName."
      displayName:
        type: string
        description: "Human-readable organization name (required)"
    required:
      - displayName

  # -- Organization response types --
  InitOrganizationResponse:
    allOf:
      - $ref: "common.yaml#/schemas/BaseResponse"
      - type: object
        properties:
          success:
            type: boolean
          orgName:
            type: string
            description: "Generated organization slug"
          displayName:
            type: string
            description: "Human-readable organization name"
          alreadyExists:
            type: boolean
            description: "True if the organization already existed (idempotent result)"
