#
# APISIX standalone declarative configuration.
# Loaded directly — no Admin API calls needed.
# Restart the APISIX container after any change to this file.
#
# Environment variables (set via Docker Compose env:):
#   JWT_PUBLIC_KEY  — PEM-encoded EC public key (ES256), newlines as \n
#   FRONTEND_URL    — allowed CORS origin
#

consumers:
  - username: mcuser
    plugins:
      jwt-auth:
        key: mcuser
        algorithm: ES256
        public_key: "${{JWT_PUBLIC_KEY}}"

routes:
  # ── Public routes: auth endpoints, no JWT required ──────────────────────────
  - id: tenant-auth
    uri: /api/tenant/auth/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "${{FRONTEND_URL}}"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id,X-Client-Request-Id"
        allow_credential: true
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  - id: enduser-auth
    uri: /api/end-user/auth/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "${{FRONTEND_URL}}"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id,X-Client-Request-Id"
        allow_credential: true
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  - id: cli-enduser-auth
    uri: /api/cli/end-user/auth/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id"
      request-id:
        header_name: X-Request-Id
        include_in_response: true

  # ── Protected routes: JWT required ──────────────────────────────────────────
  - id: graphql-all
    uri: /graphql/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "${{FRONTEND_URL}}"
        allow_methods: "POST,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id,X-Client-Request-Id"
        allow_credential: true
      request-id:
        header_name: X-Request-Id
        include_in_response: true
      jwt-auth:
        hide_credentials: false
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              local core = require("apisix.core")
              local jwt = require("resty.jwt")

              local auth_header = core.request.header(ctx, "Authorization")
              if not auth_header then return end

              local token = auth_header:match("Bearer%s+(.+)")
              if not token then return end

              local jwt_obj = jwt:load_jwt(token)
              if jwt_obj and jwt_obj.payload and jwt_obj.payload.user_id then
                core.request.set_header(ctx, "X-User-ID", jwt_obj.payload.user_id)
              end
            end

  - id: api-user
    uri: /api/user/*
    upstream_id: backend
    plugins:
      cors:
        allow_origins: "${{FRONTEND_URL}}"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Request-Id,X-Client-Request-Id"
        allow_credential: true
      request-id:
        header_name: X-Request-Id
        include_in_response: true
      jwt-auth:
        hide_credentials: false
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              local core = require("apisix.core")
              local jwt = require("resty.jwt")

              local auth_header = core.request.header(ctx, "Authorization")
              if not auth_header then return end

              local token = auth_header:match("Bearer%s+(.+)")
              if not token then return end

              local jwt_obj = jwt:load_jwt(token)
              if jwt_obj and jwt_obj.payload and jwt_obj.payload.user_id then
                core.request.set_header(ctx, "X-User-ID", jwt_obj.payload.user_id)
              end
            end

upstreams:
  - id: backend
    type: roundrobin
    nodes:
      "backend:8080": 1

#END
