<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModelCraft Wiki Reader</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0f766e;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .layout {
      max-width: 1320px;
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      padding: 16px;
    }
    .sidebar,
    .content {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .sidebar {
      padding: 16px;
      overflow: auto;
      max-height: calc(100vh - 32px);
      position: sticky;
      top: 16px;
    }
    .content {
      padding: 20px 24px;
    }
    .title {
      margin: 0;
      font-size: 24px;
    }
    .meta {
      margin: 8px 0 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .status,
    .error {
      margin: 8px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .error {
      color: #b91c1c;
    }
    .doc-list {
      list-style: none;
      margin: 12px 0 0;
      padding: 0;
    }
    .doc-list li {
      margin: 0;
      border-bottom: 1px dashed #f0f1f3;
    }
    .doc-link {
      display: block;
      padding: 10px 8px;
      border-radius: 8px;
      text-decoration: none;
      color: #374151;
      font-size: 14px;
      line-height: 1.4;
    }
    .doc-link:hover {
      background: #f9fafb;
      text-decoration: none;
    }
    .doc-link.active {
      background: #ecfdf5;
      color: #065f46;
      font-weight: 600;
    }
    .content-head {
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
      padding-bottom: 12px;
    }
    .raw-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }
    .raw-link:hover {
      text-decoration: none;
    }
    .markdown {
      line-height: 1.7;
      font-size: 16px;
    }
    .markdown h1,
    .markdown h2,
    .markdown h3 {
      margin-top: 1.4em;
      margin-bottom: 0.6em;
      line-height: 1.3;
    }
    .markdown p,
    .markdown ul,
    .markdown ol {
      margin: 0.8em 0;
    }
    .markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    .markdown table th,
    .markdown table td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    .markdown table th {
      background: #f9fafb;
    }
    .markdown code {
      background: #f3f4f6;
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 13px;
    }
    .markdown pre {
      background: #111827;
      color: #f3f4f6;
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
      margin: 16px 0;
    }
    .markdown pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: 13px;
    }
    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        max-height: none;
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1 class="title">ModelCraft Wiki</h1>
      <p class="meta">由 <code>.zread/wiki</code> 自动发布到 GitHub Pages</p>
      <p id="version" class="status">正在加载当前版本...</p>
      <ul id="list" class="doc-list"></ul>
      <p id="error" class="error"></p>
    </aside>

    <main class="content">
      <div class="content-head">
        <h2 id="doc-title" style="margin:0 0 8px;">请选择文档</h2>
        <a id="raw-link" class="raw-link" href="#" target="_blank" rel="noopener noreferrer"></a>
      </div>
      <article id="doc" class="markdown">
        <p class="status">从左侧选择文档开始阅读。</p>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    var state = {
      current: '',
      pages: [],
    };

    function normalizeCurrent(raw) {
      return raw.replace(/^\.?\/*versions\//, '').replace(/\/+$/, '');
    }

    function getDocHashFile() {
      if (!location.hash || location.hash.length < 2) return '';
      return decodeURIComponent(location.hash.slice(1));
    }

    function buildDocPath(file) {
      return './versions/' + state.current + '/' + file;
    }

    function markActive(file) {
      var links = document.querySelectorAll('.doc-link');
      links.forEach(function (el) {
        if (el.getAttribute('data-file') === file) el.classList.add('active');
        else el.classList.remove('active');
      });
    }

    async function renderDoc(file) {
      var docNode = document.getElementById('doc');
      var titleNode = document.getElementById('doc-title');
      var rawNode = document.getElementById('raw-link');

      if (!file) {
        docNode.innerHTML = '<p class="status">从左侧选择文档开始阅读。</p>';
        titleNode.textContent = '请选择文档';
        rawNode.textContent = '';
        rawNode.href = '#';
        markActive('');
        return;
      }

      var page = state.pages.find(function (p) { return p.file === file; });
      titleNode.textContent = page && page.title ? page.title : file;
      rawNode.href = buildDocPath(file);
      rawNode.textContent = '查看原始 Markdown';
      markActive(file);

      try {
        var mdRes = await fetch(buildDocPath(file));
        if (!mdRes.ok) throw new Error('读取 Markdown 失败');
        var mdText = await mdRes.text();

        if (!window.marked) throw new Error('Markdown 渲染器加载失败');
        docNode.innerHTML = window.marked.parse(mdText);
      } catch (err) {
        docNode.innerHTML = '<p class="error">加载文档失败: ' + (err && err.message ? err.message : String(err)) + '</p>';
      }
    }

    async function run() {
      var versionNode = document.getElementById('version');
      var listNode = document.getElementById('list');
      var errorNode = document.getElementById('error');

      try {
        var currentRes = await fetch('./current');
        if (!currentRes.ok) throw new Error('读取 current 失败');
        var currentRaw = (await currentRes.text()).trim();
        state.current = normalizeCurrent(currentRaw);
        versionNode.textContent = '当前版本: ' + currentRaw;

        var wikiRes = await fetch('./versions/' + state.current + '/wiki.json');
        if (!wikiRes.ok) throw new Error('读取 wiki.json 失败');
        var wiki = await wikiRes.json();

        state.pages = Array.isArray(wiki.pages) ? wiki.pages.filter(function (p) {
          return typeof p.file === 'string' && p.file.endsWith('.md');
        }) : [];

        if (state.pages.length === 0) {
          errorNode.textContent = '未找到可展示的文档条目。';
          return;
        }

        listNode.innerHTML = '';
        state.pages.forEach(function (p) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.className = 'doc-link';
          a.href = '#' + encodeURIComponent(p.file);
          a.setAttribute('data-file', p.file);
          a.textContent = p.title || p.file;
          li.appendChild(a);
          listNode.appendChild(li);
        });

        var fileFromHash = getDocHashFile();
        if (fileFromHash && state.pages.some(function (p) { return p.file === fileFromHash; })) {
          renderDoc(fileFromHash);
        } else {
          var first = state.pages[0].file;
          location.hash = encodeURIComponent(first);
        }
      } catch (err) {
        errorNode.textContent = '加载失败: ' + (err && err.message ? err.message : String(err));
      }
    }

    window.addEventListener('hashchange', function () {
      renderDoc(getDocHashFile());
    });

    run();
  </script>
</body>
</html>
