<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModelCraft Wiki</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
    }
    .wrap {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .meta {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .status {
      margin: 12px 0;
      color: var(--muted);
      font-size: 14px;
    }
    ul {
      margin: 16px 0 0;
      padding-left: 20px;
    }
    li {
      margin: 8px 0;
      line-height: 1.5;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    code {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ModelCraft Wiki</h1>
      <p class="meta">由 <code>.zread/wiki</code> 自动发布到 GitHub Pages</p>
      <p id="version" class="status">正在加载当前版本...</p>
      <ul id="list"></ul>
      <p id="error" class="status"></p>
    </div>
  </div>

  <script>
    async function run() {
      const versionNode = document.getElementById('version');
      const listNode = document.getElementById('list');
      const errorNode = document.getElementById('error');

      try {
        const currentRes = await fetch('./current');
        if (!currentRes.ok) throw new Error('读取 current 失败');
        const currentRaw = (await currentRes.text()).trim();
        const current = currentRaw.replace(/^\.?\/*versions\//, '').replace(/\/+$/, '');
        versionNode.textContent = '当前版本: ' + currentRaw;

        const wikiRes = await fetch('./versions/' + current + '/wiki.json');
        if (!wikiRes.ok) throw new Error('读取 wiki.json 失败');
        const wiki = await wikiRes.json();

        const pages = Array.isArray(wiki.pages) ? wiki.pages : [];
        if (pages.length === 0) {
          errorNode.textContent = '未找到可展示的文档条目。';
          return;
        }

        pages
          .filter((f) => typeof f.file === 'string' && f.file.endsWith('.md'))
          .forEach((f) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = './versions/' + current + '/' + f.file;
            a.textContent = f.title || f.file;
            li.appendChild(a);
            listNode.appendChild(li);
          });
      } catch (err) {
        errorNode.textContent = '加载失败: ' + (err && err.message ? err.message : String(err));
      }
    }

    run();
  </script>
</body>
</html>
